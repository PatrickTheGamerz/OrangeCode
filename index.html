<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mini Bonetale-like Game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: sans-serif;
      overflow: hidden;
    }

    #gameContainer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
    }

    #ui {
      margin-top: 10px;
      text-align: center;
    }

    canvas {
      border: 2px solid #fff;
      background: #111;
      image-rendering: pixelated;
    }

    #controls {
      font-size: 14px;
      margin-top: 6px;
      color: #ccc;
    }

    button {
      margin-top: 6px;
      padding: 4px 10px;
      background: #222;
      color: #fff;
      border: 1px solid #555;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="game" width="640" height="360"></canvas>
    <div id="ui">
      <div id="info">HP: <span id="hp">5</span> | Score: <span id="score">0</span></div>
      <div id="controls">
        Move: A / D or ← / → &nbsp;|&nbsp;
        Jump: W or ↑ or Space &nbsp;|&nbsp;
        Shoot bone: J
      </div>
      <button id="restartBtn" style="display:none;">Restart</button>
    </div>
  </div>

  <script>
    // ====== BASIC SETUP ======
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const hpEl = document.getElementById("hp");
    const scoreEl = document.getElementById("score");
    const restartBtn = document.getElementById("restartBtn");

    const W = canvas.width;
    const H = canvas.height;

    // ====== GAME STATE ======
    let lastTime = 0;
    let keys = {};
    let gameOver = false;

    const GRAVITY = 1500;      // px/s^2
    const MOVE_SPEED = 260;    // px/s
    const JUMP_SPEED = -550;   // px/s
    const FRICTION = 0.85;

    const BONE_SPEED = 500;
    const ENEMY_SPEED_MIN = 80;
    const ENEMY_SPEED_MAX = 160;
    const ENEMY_SPAWN_INTERVAL = 1.2; // seconds

    let enemySpawnTimer = 0;
    let score = 0;

    const player = {
      x: 80,
      y: H - 80,
      w: 32,
      h: 48,
      vx: 0,
      vy: 0,
      onGround: false,
      facing: 1, // 1 right, -1 left
      hp: 5
    };

    const bones = [];
    const enemies = [];

    // ====== INPUT HANDLING ======
    window.addEventListener("keydown", (e) => {
      keys[e.key.toLowerCase()] = true;
      if (["ArrowLeft", "ArrowRight", "ArrowUp", " "].includes(e.key)) {
        e.preventDefault();
      }
      // Shoot bone with J
      if (e.key.toLowerCase() === "j" && !gameOver) {
        shootBone();
      }
    });

    window.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    // ====== RESTART BUTTON ======
    restartBtn.addEventListener("click", () => {
      resetGame();
    });

    // ====== GAME FUNCTIONS ======
    function resetGame() {
      player.x = 80;
      player.y = H - 80;
      player.vx = 0;
      player.vy = 0;
      player.hp = 5;
      player.onGround = false;
      player.facing = 1;
      bones.length = 0;
      enemies.length = 0;
      score = 0;
      enemySpawnTimer = 0;
      gameOver = false;
      restartBtn.style.display = "none";
      hpEl.textContent = player.hp;
      scoreEl.textContent = score;
    }

    function shootBone() {
      const boneWidth = 18;
      const boneHeight = 6;
      const dir = player.facing || 1;
      bones.push({
        x: player.x + player.w / 2 + dir * 10,
        y: player.y + player.h / 2,
        w: boneWidth,
        h: boneHeight,
        vx: dir * BONE_SPEED
      });
    }

    function spawnEnemy() {
      const size = 32;
      const side = Math.random() < 0.5 ? "left" : "right";
      const y = H - 64; // ground-ish
      const speed =
        ENEMY_SPEED_MIN +
        Math.random() * (ENEMY_SPEED_MAX - ENEMY_SPEED_MIN);

      enemies.push({
        x: side === "left" ? -size : W + size,
        y: y,
        w: size,
        h: size,
        vx: side === "left" ? speed : -speed,
        hp: 1
      });
    }

    function rectsOverlap(a, b) {
      return !(
        a.x + a.w < b.x ||
        a.x > b.x + b.w ||
        a.y + a.h < b.y ||
        a.y > b.y + b.h
      );
    }

    // ====== UPDATE LOOP ======
    function update(dt) {
      if (gameOver) return;

      // --- Player movement ---
      let moveLeft = keys["a"] || keys["arrowleft"];
      let moveRight = keys["d"] || keys["arrowright"];
      let jumpKey = keys["w"] || keys["arrowup"] || keys[" "];

      if (moveLeft && !moveRight) {
        player.vx = -MOVE_SPEED;
        player.facing = -1;
      } else if (moveRight && !moveLeft) {
        player.vx = MOVE_SPEED;
        player.facing = 1;
      } else {
        player.vx *= FRICTION;
        if (Math.abs(player.vx) < 5) player.vx = 0;
      }

      if (jumpKey && player.onGround) {
        player.vy = JUMP_SPEED;
        player.onGround = false;
      }

      // Gravity
      player.vy += GRAVITY * dt;

      // Apply velocity
      player.x += player.vx * dt;
      player.y += player.vy * dt;

      // Floor collision
      const floorY = H - 40;
      if (player.y + player.h > floorY) {
        player.y = floorY - player.h;
        player.vy = 0;
        player.onGround = true;
      }

      // Wall bounds
      if (player.x < 0) player.x = 0;
      if (player.x + player.w > W) player.x = W - player.w;

      // --- Update bones ---
      for (let i = bones.length - 1; i >= 0; i--) {
        const b = bones[i];
        b.x += b.vx * dt;
        if (b.x < -50 || b.x > W + 50) {
          bones.splice(i, 1);
        }
      }

      // --- Spawn enemies ---
      enemySpawnTimer += dt;
      if (enemySpawnTimer >= ENEMY_SPAWN_INTERVAL) {
        enemySpawnTimer = 0;
        spawnEnemy();
      }

      // --- Update enemies ---
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.x += e.vx * dt;

        // Remove if off-screen far
        if (e.x < -100 || e.x > W + 100) {
          enemies.splice(i, 1);
          continue;
        }
      }

      // --- Collisions: bones vs enemies ---
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        for (let j = bones.length - 1; j >= 0; j--) {
          const b = bones[j];
          if (rectsOverlap(e, b)) {
            bones.splice(j, 1);
            e.hp -= 1;
            if (e.hp <= 0) {
              enemies.splice(i, 1);
              score += 10;
              scoreEl.textContent = score;
            }
            break;
          }
        }
      }

      // --- Collisions: enemies vs player ---
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (rectsOverlap(e, player)) {
          enemies.splice(i, 1);
          player.hp -= 1;
          hpEl.textContent = player.hp;
          if (player.hp <= 0) {
            gameOver = true;
            restartBtn.style.display = "inline-block";
          }
        }
      }
    }

    // ====== DRAW LOOP ======
    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Background
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);

      // Floor
      ctx.fillStyle = "#222";
      ctx.fillRect(0, H - 40, W, 40);

      // Player (simple skeleton-like)
      ctx.save();
      ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
      ctx.scale(player.facing, 1);

      // Body
      ctx.fillStyle = "#fff";
      ctx.fillRect(-8, -16, 16, 32);

      // Head
      ctx.beginPath();
      ctx.arc(0, -26, 10, 0, Math.PI * 2);
      ctx.fill();

      // Eyes
      ctx.fillStyle = "#000";
      ctx.fillRect(-5, -30, 3, 3);
      ctx.fillRect(2, -30, 3, 3);

      // Mouth
      ctx.fillRect(-4, -22, 8, 2);

      ctx.restore();

      // Bones
      for (const b of bones) {
        ctx.fillStyle = "#fff";
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.fillRect(b.x - 4, b.y - 2, 4, 10);
        ctx.fillRect(b.x + b.w, b.y - 2, 4, 10);
      }

      // Enemies (simple red squares)
      for (const e of enemies) {
        ctx.fillStyle = "#f33";
        ctx.fillRect(e.x, e.y, e.w, e.h);
        ctx.fillStyle = "#000";
        ctx.fillRect(e.x + 6, e.y + 8, 6, 6);
        ctx.fillRect(e.x + e.w - 12, e.y + 8, 6, 6);
        ctx.fillRect(e.x + 8, e.y + e.h - 10, e.w - 16, 4);
      }

      // Game over text
      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#fff";
        ctx.font = "32px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", W / 2, H / 2 - 10);
        ctx.font = "18px sans-serif";
        ctx.fillText("Score: " + score, W / 2, H / 2 + 20);
        ctx.fillText("Click Restart below to play again", W / 2, H / 2 + 50);
      }
    }

    // ====== MAIN LOOP ======
    function loop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      update(dt);
      draw();

      requestAnimationFrame(loop);
    }

    // Start
    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
