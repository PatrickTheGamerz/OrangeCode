<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mini Bonetale Sans vs Chara</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: sans-serif;
      overflow: hidden;
    }

    #gameContainer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
    }

    canvas {
      border: 2px solid #fff;
      background: #111;
      image-rendering: pixelated;
    }

    #ui {
      margin-top: 8px;
      text-align: center;
      font-size: 14px;
    }

    #controls {
      margin-top: 4px;
      color: #ccc;
    }

    button {
      margin-top: 6px;
      padding: 4px 10px;
      background: #222;
      color: #fff;
      border: 1px solid #555;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="game" width="640" height="360"></canvas>
    <div id="ui">
      <div>
        HP: <span id="hp">1</span> |
        Stamina: <span id="stam">100</span> |
        Time survived: <span id="time">0.0</span>s
      </div>
      <div id="controls">
        Move: A/D or ←/→ &nbsp;|&nbsp;
        Jump: W / ↑ / Space &nbsp;|&nbsp;
        Dash: Shift &nbsp;|&nbsp;
        Shoot bone: J
      </div>
      <button id="restartBtn" style="display:none;">Restart</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const hpEl = document.getElementById("hp");
    const stamEl = document.getElementById("stam");
    const timeEl = document.getElementById("time");
    const restartBtn = document.getElementById("restartBtn");

    const W = canvas.width;
    const H = canvas.height;

    // ===== GAME CONSTANTS =====
    const GRAVITY = 1500;
    const MOVE_SPEED = 220;
    const DASH_SPEED = 420;
    const JUMP_SPEED = -550;
    const FRICTION = 0.85;

    const BONE_SPEED = 520;
    const BONE_COST = 8;
    const JUMP_COST = 5;
    const DASH_COST_PER_SEC = 25;

    const STAM_MAX = 100;
    const STAM_REGEN_IDLE = 15; // per second when not doing actions

    const FLOOR_Y = H - 60;

    const KNIFE_SPEED = 260;
    const KNIFE_INTERVAL = 1.0; // seconds

    // ===== GAME STATE =====
    let keys = {};
    let lastTime = 0;
    let gameOver = false;
    let elapsed = 0;

    const player = {
      x: W / 2 - 16,
      y: FLOOR_Y - 48,
      w: 32,
      h: 48,
      vx: 0,
      vy: 0,
      onGround: false,
      facing: 1,
      hp: 1,
      stamina: STAM_MAX,
      dashing: false
    };

    const chara = {
      x: W / 2 - 16,
      y: 40,
      w: 32,
      h: 48
    };

    const bones = [];
    const knives = [];
    let knifeTimer = 0;

    // ===== INPUT =====
    window.addEventListener("keydown", (e) => {
      keys[e.key.toLowerCase()] = true;
      if (["ArrowLeft", "ArrowRight", "ArrowUp", " "].includes(e.key)) {
        e.preventDefault();
      }
      if (e.key.toLowerCase() === "j" && !gameOver) {
        shootBone();
      }
    });

    window.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    restartBtn.addEventListener("click", () => {
      resetGame();
    });

    // ===== RESET =====
    function resetGame() {
      player.x = W / 2 - 16;
      player.y = FLOOR_Y - 48;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      player.facing = 1;
      player.hp = 1;
      player.stamina = STAM_MAX;
      player.dashing = false;

      bones.length = 0;
      knives.length = 0;
      knifeTimer = 0;
      elapsed = 0;
      gameOver = false;
      restartBtn.style.display = "none";

      hpEl.textContent = player.hp;
      stamEl.textContent = Math.round(player.stamina);
      timeEl.textContent = elapsed.toFixed(1);
    }

    // ===== UTILS =====
    function rectsOverlap(a, b) {
      return !(
        a.x + a.w < b.x ||
        a.x > b.x + b.w ||
        a.y + a.h < b.y ||
        a.y > b.y + b.h
      );
    }

    // ===== ACTIONS =====
    function shootBone() {
      if (player.stamina <= BONE_COST || gameOver) return;
      player.stamina -= BONE_COST;
      const dir = player.facing || 1;
      bones.push({
        x: player.x + player.w / 2 + dir * 10,
        y: player.y + player.h / 2,
        w: 18,
        h: 6,
        vx: dir * BONE_SPEED
      });
    }

    function spawnKnife() {
      // Chara throws a knife from random x at top towards bottom
      const size = 16;
      const x = Math.random() * (W - size);
      knives.push({
        x: x,
        y: chara.y + chara.h,
        w: size,
        h: size,
        vy: KNIFE_SPEED
      });
    }

    // ===== UPDATE =====
    function update(dt) {
      if (gameOver) return;

      elapsed += dt;
      timeEl.textContent = elapsed.toFixed(1);

      let moveLeft = keys["a"] || keys["arrowleft"];
      let moveRight = keys["d"] || keys["arrowright"];
      let jumpKey = keys["w"] || keys["arrowup"] || keys[" "];
      let dashKey = keys["shift"];

      let doingAction = false;

      // Horizontal movement
      if (moveLeft && !moveRight) {
        player.vx = -MOVE_SPEED;
        player.facing = -1;
        doingAction = true;
      } else if (moveRight && !moveLeft) {
        player.vx = MOVE_SPEED;
        player.facing = 1;
        doingAction = true;
      } else {
        player.vx *= FRICTION;
        if (Math.abs(player.vx) < 5) player.vx = 0;
      }

      // Dash
      if (dashKey && player.stamina > 0) {
        player.dashing = true;
        const dashDir = player.facing || 1;
        player.vx = dashDir * DASH_SPEED;
        player.stamina -= DASH_COST_PER_SEC * dt;
        doingAction = true;
      } else {
        player.dashing = false;
      }

      // Jump
      if (jumpKey && player.onGround && player.stamina > JUMP_COST) {
        player.vy = JUMP_SPEED;
        player.onGround = false;
        player.stamina -= JUMP_COST;
        doingAction = true;
      }

      // Gravity
      player.vy += GRAVITY * dt;

      // Apply velocity
      player.x += player.vx * dt;
      player.y += player.vy * dt;

      // Floor
      if (player.y + player.h > FLOOR_Y) {
        player.y = FLOOR_Y - player.h;
        player.vy = 0;
        player.onGround = true;
      }

      // Walls
      if (player.x < 0) player.x = 0;
      if (player.x + player.w > W) player.x = W - player.w;

      // Stamina regen when idle
      if (!doingAction && player.stamina < STAM_MAX) {
        player.stamina += STAM_REGEN_IDLE * dt;
      }
      if (player.stamina > STAM_MAX) player.stamina = STAM_MAX;

      // If stamina runs out → Sans is done
      if (player.stamina <= 0) {
        player.stamina = 0;
        endGame("Sans ran out of stamina...");
      }

      // Update bones
      for (let i = bones.length - 1; i >= 0; i--) {
        const b = bones[i];
        b.x += b.vx * dt;
        if (b.x < -50 || b.x > W + 50) {
          bones.splice(i, 1);
        }
      }

      // Knife spawn
      knifeTimer += dt;
      if (knifeTimer >= KNIFE_INTERVAL) {
        knifeTimer = 0;
        spawnKnife();
      }

      // Update knives
      for (let i = knives.length - 1; i >= 0; i--) {
        const k = knives[i];
        k.y += k.vy * dt;
        if (k.y > H + 40) {
          knives.splice(i, 1);
          continue;
        }
      }

      // Bones vs Chara (just for fun, no HP)
      for (let i = bones.length - 1; i >= 0; i--) {
        const b = bones[i];
        if (rectsOverlap(b, chara)) {
          // small knockback visual effect: move chara slightly
          chara.x += (b.vx > 0 ? 1 : -1) * 4;
          bones.splice(i, 1);
        }
      }

      // Knives vs player
      for (let i = knives.length - 1; i >= 0; i--) {
        const k = knives[i];
        if (rectsOverlap(k, player)) {
          knives.splice(i, 1);
          player.hp -= 1;
          hpEl.textContent = player.hp;
          if (player.hp <= 0) {
            endGame("Sans took a hit...");
          }
        }
      }

      // Clamp chara position
      if (chara.x < 20) chara.x = 20;
      if (chara.x + chara.w > W - 20) chara.x = W - 20 - chara.w;

      // Update UI
      stamEl.textContent = Math.round(player.stamina);
    }

    function endGame(reason) {
      if (gameOver) return;
      gameOver = true;
      restartBtn.style.display = "inline-block";
      // You can log reason if you want to debug:
      // console.log(reason);
    }

    // ===== DRAW =====
    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Background
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);

      // Floor
      ctx.fillStyle = "#222";
      ctx.fillRect(0, FLOOR_Y, W, H - FLOOR_Y);

      // Sans (player)
      ctx.save();
      ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
      ctx.scale(player.facing, 1);

      // Body
      ctx.fillStyle = "#fff";
      ctx.fillRect(-8, -16, 16, 32);

      // Head
      ctx.beginPath();
      ctx.arc(0, -26, 10, 0, Math.PI * 2);
      ctx.fill();

      // Eyes
      ctx.fillStyle = "#000";
      ctx.fillRect(-5, -30, 3, 3);
      ctx.fillRect(2, -30, 3, 3);

      // Mouth
      ctx.fillRect(-4, -22, 8, 2);

      ctx.restore();

      // Chara
      ctx.fillStyle = "#f33";
      ctx.fillRect(chara.x, chara.y, chara.w, chara.h);
      ctx.fillStyle = "#000";
      ctx.fillRect(chara.x + 6, chara.y + 10, 6, 6);
      ctx.fillRect(chara.x + chara.w - 12, chara.y + 10, 6, 6);
      ctx.fillRect(chara.x + 8, chara.y + chara.h - 10, chara.w - 16, 4);

      // Bones
      for (const b of bones) {
        ctx.fillStyle = "#fff";
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.fillRect(b.x - 4, b.y - 2, 4, 10);
        ctx.fillRect(b.x + b.w, b.y - 2, 4, 10);
      }

      // Knives
      for (const k of knives) {
        ctx.fillStyle = "#f00";
        ctx.fillRect(k.x, k.y, k.w, k.h);
        ctx.fillStyle = "#900";
        ctx.fillRect(k.x + 4, k.y + 4, k.w - 8, k.h - 8);
      }

      // UI bars (HP and stamina)
      // HP bar (1 HP, just visual)
      ctx.fillStyle = "#444";
      ctx.fillRect(20, 20, 100, 10);
      ctx.fillStyle = player.hp > 0 ? "#0f0" : "#400";
      ctx.fillRect(20, 20, (player.hp / 1) * 100, 10);

      // Stamina bar
      ctx.fillStyle = "#444";
      ctx.fillRect(20, 40, 150, 10);
      ctx.fillStyle = "#0ff";
      ctx.fillRect(20, 40, (player.stamina / STAM_MAX) * 150, 10);

      // Game over overlay
      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#fff";
        ctx.font = "28px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", W / 2, H / 2 - 10);
        ctx.font = "18px sans-serif";
        ctx.fillText("Time survived: " + elapsed.toFixed(1) + "s", W / 2, H / 2 + 20);
        ctx.fillText("Click Restart below to try again", W / 2, H / 2 + 50);
      }
    }

    // ===== MAIN LOOP =====
    function loop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      update(dt);
      draw();

      requestAnimationFrame(loop);
    }

    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
