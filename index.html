<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sans AU Simulator - Multiversal EX++</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      background:black;
      color:white;
      font-family:"Courier New",monospace;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh
    }
    #game{
      width:960px;
      height:640px;
      border:4px solid white;
      background:#111;
      display:grid;
      grid-template-rows:380px 120px 140px;
      grid-template-columns:1fr
    }
    #battleArea{
      position:relative;
      border-bottom:2px solid white
    }
    #canvas{
      width:100%;
      height:100%;
      image-rendering:pixelated
    }
    #infoBar{
      border-bottom:2px solid white;
      display:grid;
      grid-template-columns:1.2fr 0.8fr;
      padding:8px 12px;
      font-size:14px
    }
    #playerInfo,#enemyInfo{
      display:flex;
      flex-direction:column;
      gap:4px
    }
    .hpBarContainer{
      width:100%;
      height:14px;
      border:1px solid white;
      background:#222;
      position:relative
    }
    .hpBar{
      height:100%;
      background:#0f0;
      transition:width .2s
    }
    .hpText{
      position:absolute;
      top:-18px;
      left:0;
      font-size:12px
    }
    .staminaBarContainer{
      width:100%;
      height:10px;
      border:1px solid #888;
      background:#111;
      position:relative;
      margin-top:2px
    }
    .staminaBar{
      height:100%;
      background:#0af;
      transition:width .2s
    }
    .staminaText{
      position:absolute;
      top:-14px;
      left:0;
      font-size:11px;
      color:#aaa
    }
    #menu{
      display:flex;
      flex-wrap:wrap;
      align-items:flex-start;
      justify-content:flex-start;
      padding:8px 12px;
      gap:8px;
      font-size:14px
    }
    button{
      background:black;
      color:white;
      border:2px solid white;
      padding:6px 14px;
      font-size:14px;
      cursor:pointer;
      transition:background .15s,color .15s,transform .05s
    }
    button:hover{
      background:white;
      color:black
    }
    button:active{
      transform:translateY(1px)
    }
    #log{
      font-size:13px;
      padding:4px 12px;
      overflow-y:auto;
      max-height:136px
    }
    #log p{
      margin:2px 0
    }
    .centerText{
      width:100%;
      text-align:center
    }
    .title{
      font-size:22px;
      margin-bottom:8px;
      text-align:center
    }
    .subtitle{
      font-size:14px;
      margin-bottom:12px;
      text-align:center;
      color:#ccc
    }
    .auButton{
      min-width:170px
    }
    .small{
      font-size:11px;
      color:#aaa
    }
    .phaseTag{
      font-size:12px;
      color:#ff0
    }
  </style>
</head>
<body>
  <div id="game">
    <div id="battleArea">
      <canvas id="canvas" width="960" height="380"></canvas>
    </div>
    <div id="infoBar">
      <div id="playerInfo">
        <div><strong>PLAYER:</strong> <span id="playerName">-</span></div>
        <div class="hpBarContainer">
          <div class="hpBar" id="playerHpBar"></div>
          <div class="hpText" id="playerHpText"></div>
        </div>
        <div class="staminaBarContainer">
          <div class="staminaBar" id="playerStaminaBar"></div>
          <div class="staminaText" id="playerStaminaText"></div>
        </div>
        <div id="playerStats"></div>
        <div id="playerItems" class="small"></div>
      </div>
      <div id="enemyInfo">
        <div><strong>ENEMY:</strong> <span id="enemyName">-</span> <span id="enemyPhase" class="phaseTag"></span></div>
        <div class="hpBarContainer">
          <div class="hpBar" id="enemyHpBar"></div>
          <div class="hpText" id="enemyHpText"></div>
        </div>
        <div class="staminaBarContainer">
          <div class="staminaBar" id="enemyStaminaBar"></div>
          <div class="staminaText" id="enemyStaminaText"></div>
        </div>
        <div id="enemyStats"></div>
        <div id="enemyItems" class="small"></div>
      </div>
    </div>
    <div id="menu"></div>
    <div id="log"></div>
  </div>
  <script>

    const enemyHpText=document.getElementById("enemyHpText");
    const playerStaminaBar=document.getElementById("playerStaminaBar");
    const enemyStaminaBar=document.getElementById("enemyStaminaBar");
    const playerStaminaText=document.getElementById("playerStaminaText");

    const enemyItemsEl=document.getElementById("enemyItems");
    const GAME_WIDTH=canvas.width;
    const GAME_HEIGHT=canvas.height;
    const dodgeBox={x:260,y:150,w:440,h:200};
    const AUs={
      "Classic Sans":{

        staminaMax:105,basePattern:"error",

          "err1","err2","err3","err4","err5","err6","err7","err8","err9","err10",

      "Horror Sans":{

        specialCost:35,healName:"Rotten Food",healPower:40,healUses:1,
        staminaMax:100,basePattern:"horror",
        patterns:[
          "hor1","hor2","hor3","hor4","hor5","hor6","hor7","hor8","hor9","hor10",

        color:"white",
        specialNamePhase:["Phase 1 Spiral","Phase 2 Judgement","Phase 3 Finale"],
        specialCostPhase:[30,35,0],
        healName:"Determined Ketchup",
        healPower:25,
        healUses:2,
        staminaMaxPhase:[110,130,200],
        basePatternPhase:["lb1","lb2","lb3"],
        patternsPhase:[
          [
            "lb1a","lb1b","lb1c","lb1d","lb1e",
            "lb1f","lb1g","lb1h","lb1i","lb1j",
            "lb1Wave1","lb1Wave2","lb1Jump1","lb1Jump2",

          ],
          [
            "lb2a","lb2b","lb2c","lb2d","lb2e",

            "lb2Wave1","lb2Wave2","lb2Jump1","lb2Jump2",
            "lb2Spiral1","lb2Spiral2","lb2Wing1","lb2Wing2"
          ],
          [
            "lb3a","lb3b","lb3c","lb3d","lb3e",
            "lb3f","lb3g","lb3h","lb3i","lb3j",
            "lb3Wave1","lb3Wave2","lb3Jump1","lb3Jump2",
            "lb3Spiral1","lb3Spiral2","lb3Wing1","lb3Wing2","lb3Chaos1","lb3Chaos2"
          ]
        ]
      }
    };
    let player=null;
    let enemy=null;
    let state="chooseAU";
    let turn=1;
    let keys={};
    let soul={x:0,y:0,r:8,speed:4};
    let bullets=[];
    let dodgeTimer=0;
    let dodgeDuration=2500;
    let lastFrameTime=0;
    let dodgeActive=false;
    let dodgeCallback=null;
    let cameraShake=0;
    let cameraShakeTime=0;
    let dodgeStillTime=0;
    let lbFinalHealsUsed=0;
    let lbFinalNextHeal=0;
    window.addEventListener("keydown",e=>{keys[e.key.toLowerCase()]=true});
    window.addEventListener("keyup",e=>{keys[e.key.toLowerCase()]=false});
    function log(msg){
      const p=document.createElement("p");
      p.textContent=msg;
      logDiv.appendChild(p);
      logDiv.scrollTop=logDiv.scrollHeight
    }
    function clearLog(){logDiv.innerHTML=""}
    function updateBars(){
      if(!player||!enemy)return;
      const pRatio=Math.max(player.hp,0)/player.maxHp;
      const eRatio=Math.max(enemy.hp,0)/enemy.maxHp;
      playerHpBar.style.width=(pRatio*100)+"%";
      enemyHpBar.style.width=(eRatio*100)+"%";
      playerHpBar.style.background=pRatio>0.4?"#0f0":pRatio>0.2?"#ff0":"#f00";
      enemyHpBar.style.background=eRatio>0.4?"#0f0":eRatio>0.2?"#ff0":"#f00";
      playerHpText.textContent=`HP: ${Math.max(0,Math.floor(player.hp))}/${player.maxHp}`;
      enemyHpText.textContent=`HP: ${Math.max(0,Math.floor(enemy.hp))}/${enemy.maxHp}`;
      const psRatio=Math.max(player.stamina,0)/player.staminaMax;
      const esRatio=Math.max(enemy.stamina,0)/enemy.staminaMax;
      playerStaminaBar.style.width=(psRatio*100)+"%";
      enemyStaminaBar.style.width=(esRatio*100)+"%";
      playerStaminaText.textContent=`ST: ${Math.max(0,Math.floor(player.stamina))}/${player.staminaMax}`;
      enemyStaminaText.textContent=`ST: ${Math.max(0,Math.floor(enemy.stamina))}/${enemy.staminaMax}`;
      playerStatsEl.textContent=`ATK: ${player.atk} | DODGE: ${(player.dodge*100).toFixed(0)}% | CRIT: ${(player.crit*100).toFixed(0)}%`;
      enemyStatsEl.textContent=`ATK: ${enemy.atk} | DODGE: ${(enemy.dodge*100).toFixed(0)}% | CRIT: ${(enemy.crit*100).toFixed(0)}%`;
      playerItemsEl.textContent=`ITEM: ${player.healName} x${player.healUses}${player.isLastBreathPlayer?` | LIVES: ${player.lives}`:""}`;
      enemyItemsEl.textContent=`ITEM: ${enemy.healName} x${enemy.healUses}`;
      if(enemy.isLastBreath)enemyPhaseEl.textContent=`PHASE ${enemy.phase}`;
      else enemyPhaseEl.textContent=""
    }
    function clearCanvas(){
      ctx.save();
      ctx.setTransform(1,0,0,1,0,0);
      ctx.fillStyle="#000";
      ctx.fillRect(0,0,GAME_WIDTH,GAME_HEIGHT);
      ctx.restore()
    }
    function applyCamera(){
      if(cameraShakeTime>0){
        const intensity=cameraShake;
        const dx=(Math.random()*2-1)*intensity;
        const dy=(Math.random()*2-1)*intensity;
        ctx.setTransform(1,0,0,1,dx,dy)
      }else{
        ctx.setTransform(1,0,0,1,0,0)
      }
    }
    function drawCharacters(){
      clearCanvas();
      applyCamera();
      if(!player||!enemy)return;
      ctx.fillStyle=player.color;
      ctx.fillRect(120,240,80,80);
      ctx.strokeStyle="white";
      ctx.strokeRect(120,240,80,80);
      ctx.fillStyle="white";
      ctx.font="16px Courier New";
      ctx.fillText(player.name,110,230);
      ctx.fillStyle=enemy.color;
      ctx.fillRect(760,60,80,80);
      ctx.strokeStyle="white";
      ctx.strokeRect(760,60,80,80);
      ctx.fillStyle="white";
      ctx.fillText(enemy.name,740,50);
      ctx.strokeStyle="white";
      ctx.strokeRect(dodgeBox.x,dodgeBox.y,dodgeBox.w,dodgeBox.h);
      ctx.font="14px Courier New";
      ctx.fillText("DODGE ZONE (WASD)",dodgeBox.x,dodgeBox.y-8)
    }
    function calcDamage(attacker,basePower,allowCrit=true){
      let dmg=basePower+(Math.random()*6-3);
      let crit=false;
      if(allowCrit&&Math.random()<attacker.crit){
        dmg*=1.7;
        crit=true
      }
      dmg=Math.max(1,Math.round(dmg));
      return{dmg,crit}
    }
    function tryHit(attacker,defender,basePower,hitChance=1,ignoreDodge=false){
      if(Math.random()>hitChance)return{type:"miss"};
      let dodgeChance=ignoreDodge?0:defender.dodge;
      if(Math.random()<dodgeChance)return{type:"dodge"};
      const{dmg,crit}=calcDamage(attacker,basePower,true);
      defender.hp-=dmg;
      return{type:"hit",dmg,crit}
    }
    function rectCircleCollide(rx,ry,rw,rh,cx,cy,cr){
      const tx=Math.max(rx,Math.min(cx,rx+rw));
      const ty=Math.max(ry,Math.min(cy,ry+rh));
      const dist=Math.hypot(cx-tx,cy-ty);
      return dist<=cr
    }
    function randomFrom(arr){return arr[Math.floor(Math.random()*arr.length)]}
    function spawnPattern(pattern,tag){
      bullets=[];
      const bx=dodgeBox.x;
      const by=dodgeBox.y;
      const bw=dodgeBox.w;
      const bh=dodgeBox.h;
      function lineHorizontal(y,count,speed,color,type,long=false){
        for(let i=0;i<count;i++){
          const w=long?80:26;
          bullets.push({x:bx-40-i*60,y,w,h:10,vx:speed,vy:0,color,type,delay:0})
        }
      }
      function lineVertical(x,count,speed,color,type,long=false){
        for(let i=0;i<count;i++){
          const h=long?80:24;
          bullets.push({x,y:by-40-i*30,w:12,h,vx:0,vy:speed,color,type,delay:0})
        }
      }
      function blasterSpiral(cx,cy,radius,count,speed,color,type){
        for(let i=0;i<count;i++){
          const angle=(Math.PI*2/count)*i;
          const sx=cx+Math.cos(angle)*radius;
          const sy=cy+Math.sin(angle)*radius;
          const delay=i*600;
          const dx=soul.x-sx;
          const dy=soul.y-sy;
          const len=Math.hypot(dx,dy)||1;
          const vx=(dx/len)*speed;
          const vy=(dy/len)*speed;
          bullets.push({x:sx,y:sy,w:34,h:34,vx,vy,color,type,blaster:true,delay})
        }
      }
      function boneWaveHorizontal(rows,speed,color,type,phaseShift){
        for(let r=0;r<rows;r++){
          for(let i=0;i<12;i++){
            const offset=Math.sin((i+phaseShift)*0.6+r)*20;
            bullets.push({x:bx-40-i*60,y:by+40+r*30+offset,w:26,h:10,vx:speed,vy:0,color,type,delay:0})
          }
        }
      }
      function boneJumpFloor(gapCount,color,type){
        const gapWidth=dodgeBox.w/(gapCount+1);
        for(let i=0;i<gapCount+1;i++){
          const gx=bx+i*gapWidth+10;
          bullets.push({x:gx,y:by+bh-20,w:gapWidth-20,h:18,vx:0,vy:0,color,type,delay:0})
        }
      }
      function wingdingsRain(color){
        for(let i=0;i<18;i++){
          bullets.push({x:bx+Math.random()*bw,y:by-40,w:18,h:18,vx:0,vy:3.5,color,type:"white",wing:true,delay:0})
        }
      }
      if(pattern==="classic1"||pattern==="classic"){
        lineHorizontal(by+40,10,3.2,"white","white");
      }else if(pattern==="classic2"){
        lineVertical(bx+40,8,3.2,"white","white");
        lineVertical(bx+bw-40,8,3.2,"white","white");
      }else if(pattern==="classic3"){
        lineHorizontal(by+bh/2-20,8,3.6,"white","white");
        lineHorizontal(by+bh/2+20,8,3.6,"white","white");
      }else if(pattern==="classic4"){
        for(let i=0;i<6;i++)bullets.push({x:bx+bw/2-20+i*40,y:by-40,w:30,h:30,vx:0,vy:3.5,color:"white",type:"white",blaster:true,delay:0});
      }else if(pattern==="classic5"){
        for(let i=0;i<12;i++){
          const side=i%4;
          let x,y,vx,vy;
          if(side===0){x=bx-30;y=by+Math.random()*bh;vx=3.2;vy=0}
          else if(side===1){x=bx+bw+30;y=by+Math.random()*bh;vx=-3.2;vy=0}
          else if(side===2){x=bx+Math.random()*bw;y=by-30;vx=0;vy=3.2}
          else{x=bx+Math.random()*bw;y=by+bh+30;vx=0;vy=-3.2}
          bullets.push({x,y,w:16,h:16,vx,vy,color:"white",type:"white",delay:0});
        }
      }else if(pattern==="classic6"){
        for(let i=0;i<10;i++){
          bullets.push({x:bx-40-i*60,y:by+20+(i%5)*30,w:22,h:10,vx:3.8,vy:0,color:"white",type:"white",delay:0});
          bullets.push({x:bx+20+(i%5)*70,y:by+bh+30+i*10,w:14,h:24,vx:0,vy:-3.8,color:"white",type:"white",delay:0});
        }
      }else if(pattern==="classic7"){
        for(let i=0;i<10;i++){
          bullets.push({x:bx+Math.random()*bw,y:by-30,w:10,h:20,vx:0,vy:3.5,color:"white",type:"white",delay:0});
        }
      }else if(pattern==="classic8"){
        for(let i=0;i<10;i++){
          bullets.push({x:bx-40-i*60,y:by+Math.random()*bh,w:24,h:10,vx:3.5,vy:0,color:"white",type:"white",delay:0});
        }
      }else if(pattern==="classic9"){
        for(let i=0;i<8;i++){
          bullets.push({x:bx+bw/2-20+i*30,y:by-40,w:30,h:30,vx:0,vy:3.8,color:"white",type:"white",blaster:true,delay:0});
          bullets.push({x:bx-40-i*60,y:by+bh/2-10,w:24,h:10,vx:3.8,vy:0,color:"white",type:"white",delay:0});
        }
      }else if(pattern==="classic10"){
        for(let i=0;i<14;i++){
          const angle=(Math.PI*2/14)*i;
          const radius=bh/2;
          const cx=bx+bw/2+Math.cos(angle)*radius;
          const cy=by+bh/2+Math.sin(angle)*radius;
          const dx=soul.x-cx;
          const dy=soul.y-cy;
          const len=Math.hypot(dx,dy)||1;
          const vx=(dx/len)*3.5;
          const vy=(dy/len)*3.5;
          bullets.push({x:cx,y:cy,w:16,h:16,vx,vy,color:"white",type:"white",delay:i*600});
        }
      }else if(pattern==="classicWave1"){
        boneWaveHorizontal(3,3.4,"white","white",0);
      }else if(pattern==="classicWave2"){
        boneWaveHorizontal(4,3.8,"white","white",3);
      }else if(pattern==="classicJump1"){
        boneJumpFloor(3,"white","white");
      }else if(pattern==="classicJump2"){
        boneJumpFloor(4,"white","white");
        for(let i=0;i<6;i++)bullets.push({x:bx+Math.random()*bw,y:by-40,w:16,h:26,vx:0,vy:3.8,color:"white",type:"white",delay:0});
      }else if(pattern==="classicSpiral1"){
        blasterSpiral(bx+bw/2,by+bh/2,120,10,3.4,"white","white");
      }else if(pattern==="classicSpiral2"){
        blasterSpiral(bx+bw/2,by+bh/2,150,14,3.8,"white","white");
      }else if(pattern==="classicCross1"){
        lineHorizontal(by+bh/2,12,3.6,"white","white",true);
        lineVertical(bx+bw/2,10,3.6,"white","white",true);
      }else if(pattern==="classicCross2"){

    function startDodgePhase(attacker,defender,baseDamage,pattern,extra){
      state="dodgePhase";
      dodgeActive=true;
      dodgeCallback=extra&&extra.callback?extra.callback:null;
      dodgeTimer=0;
      dodgeStillTime=0;
      lastFrameTime=performance.now();
      dodgeDuration=extra&&extra.duration?extra.duration:2500;
      soul.x=dodgeBox.x+dodgeBox.w/2;
      soul.y=dodgeBox.y+dodgeBox.h/2;
      spawnPattern(pattern,extra&&extra.tag?extra.tag:null);
      updateBars();
      log(`${attacker.name} attacks! Use W A S D to dodge in the box!`);
      animateDodge(attacker,defender,baseDamage,pattern,extra)
    }
    function animateDodge(attacker,defender,baseDamage,pattern,extra){
      if(!dodgeActive)return;
      const now=performance.now();
      const dt=now-lastFrameTime;
      lastFrameTime=now;
      dodgeTimer+=dt;
      cameraShakeTime=Math.max(0,cameraShakeTime-dt);
      let dx=0,dy=0;
      if(keys["a"])dx-=1;
      if(keys["d"])dx+=1;
      if(keys["w"])dy-=1;
      if(keys["s"])dy+=1;
      const moving=Math.abs(dx)+Math.abs(dy)>0;
      if(moving)dodgeStillTime=0;
      else dodgeStillTime+=dt;
      if(!moving&&dodgeStillTime>1200){
        if(defender===player){
          player.stamina=Math.min(player.staminaMax,player.stamina+dt*0.02);
          updateBars();
        }
      }
      const len=Math.hypot(dx,dy)||1;
      soul.x+=dx/len*soul.speed;
      soul.y+=dy/len*soul.speed;
      soul.x=Math.max(dodgeBox.x+soul.r,Math.min(dodgeBox.x+dodgeBox.w-soul.r,soul.x));
      soul.y=Math.max(dodgeBox.y+soul.r,Math.min(dodgeBox.y+dodgeBox.h-soul.r,soul.y));
      bullets.forEach(b=>{
        if(dodgeTimer>=b.delay){
          b.x+=b.vx;
          b.y+=b.vy
        }
      });
      let hits=0;
      bullets.forEach(b=>{
        if(dodgeTimer<b.delay)return;
        if(rectCircleCollide(b.x,b.y,b.w,b.h,soul.x,soul.y,soul.r)){
          if(b.type==="blue"&&moving)hits++;
          else if(b.type==="orange"&&!moving)hits++;
          else if(b.type==="white")hits++;
          b.x=-9999;
          b.y=-9999
        }
      });
      if(hits>0){
        const perHit=baseDamage/5;
        const total=perHit*hits;
        defender.hp-=total;
        if(defender===player){
          player.stamina=Math.max(0,player.stamina-total*0.4);
        }
        cameraShake=4;
        cameraShakeTime=200;
        log(`${defender.name} was hit ${hits} time(s) for ${Math.round(total)} damage!`);
        updateBars();
        if(defender.hp<=0){
          endOrPhase(attacker,defender);
          dodgeActive=false;
          return
        }
      }
      clearCanvas();
      applyCamera();
      drawCharacters();
      ctx.strokeStyle="white";
      ctx.strokeRect(dodgeBox.x,dodgeBox.y,dodgeBox.w,dodgeBox.h);
      bullets.forEach(b=>{
        if(dodgeTimer>=b.delay){
          ctx.fillStyle=b.color;
          ctx.fillRect(b.x,b.y,b.w,b.h)
        }
      });
      ctx.fillStyle="red";
      ctx.beginPath();
      ctx.arc(soul.x,soul.y,soul.r,0,Math.PI*2);
      ctx.fill();
      const remaining=Math.max(0,dodgeDuration-dodgeTimer);
      const ratio=remaining/dodgeDuration;
      ctx.fillStyle="yellow";
      ctx.fillRect(dodgeBox.x,dodgeBox.y-10,dodgeBox.w*ratio,6);
      if(dodgeTimer>=dodgeDuration){
        dodgeActive=false;
        if(dodgeCallback)dodgeCallback();
        else{
          if(!checkEnd())showPlayerMenu()
        }
        return
      }
      requestAnimationFrame(()=>animateDodge(attacker,defender,baseDamage,pattern,extra))
    }
    function endBattle(winner){
      state="end";
      menu.innerHTML="";
      if(winner==="player")log("You won the battle. Timeline saved.");

    function resetPlayerForPhase(){

      log("Your HP and stamina are restored for the new phase.")
    }
    function endOrPhase(attacker,defender){
      if(defender.isLastBreath&&defender.phase<3){
        if(defender.phase===1){
          defender.phase=2;
          defender.maxHp=enemy.base.maxHpPhase[1];
          defender.hp=defender.maxHp;
          defender.atk=enemy.base.atkPhase[1];
          defender.dodge=enemy.base.dodgePhase[1];
          defender.crit=enemy.base.critPhase[1];
          defender.staminaMax=enemy.base.staminaMaxPhase[1];
          defender.stamina=defender.staminaMax;
          defender.basePattern=enemy.base.basePatternPhase[1];
          defender.patterns=enemy.base.patternsPhase[1];
          defender.desperationUsed=false;
          log("Last Breath Sans refuses to die... Phase 2 begins!");
          resetPlayerForPhase();
          updateBars();
          setTimeout(()=>{showPlayerMenu()},900)
        }else if(defender.phase===2){
          const surviveRoll=Math.random();
          if(surviveRoll<2/3){
            defender.phase=3;
            defender.maxHp=enemy.base.maxHpPhase[2];
            defender.hp=defender.maxHp*0.000125;
            defender.atk=enemy.base.atkPhase[2];
            defender.dodge=enemy.base.dodgePhase[2];
            defender.crit=enemy.base.critPhase[2];
            defender.staminaMax=enemy.base.staminaMaxPhase[2];
            defender.stamina=defender.staminaMax;
            defender.basePattern=enemy.base.basePatternPhase[2];
            defender.patterns=enemy.base.patternsPhase[2];
            defender.desperationUsed=false;
            log("Against all odds, Last Breath Sans clings to life... Phase 3 AWAKENS.");
            resetPlayerForPhase();
            updateBars();
            setTimeout(()=>{lastBreathFinalPhase()},900)
          }else{
            defender.hp=0;
            updateBars();
            endBattle(attacker===player?"player":"enemy")
          }
        }
      }else{
        if(attacker===player)endBattle("player");
        else endBattle("enemy")
      }
    }
    function checkEnd(){
      if(player.hp<=0){
        if(player.isLastBreathPlayer&&player.lives>1){
          player.lives--;
          player.hp=player.maxHp;
          player.stamina=player.staminaMax;
          log(`Last Breath Sans hangs on... Lives left: ${player.lives}`);
          updateBars();
          return false
        }
        player.hp=0;
        updateBars();
        endBattle("enemy");
        return true
      }
      if(enemy.hp<=0){
        enemy.hp=0;
        updateBars();
        endOrPhase(player,enemy);
        return true
      }
      return false
    }

    function animateFinalLB(){
      if(!dodgeActive)return;
      const now=performance.now();
      const dt=now-lastFrameTime;
      lastFrameTime=now;
      dodgeTimer+=dt;
      cameraShakeTime=Math.max(0,cameraShakeTime-dt);
      let upKey="w",downKey="s",leftKey="a",rightKey="d";
      if(dodgeTimer>4000&&dodgeTimer<8000){
        leftKey="d";rightKey="a";
      }else if(dodgeTimer>8000&&dodgeTimer<12000){
        upKey="s";downKey="w";
      }else if(dodgeTimer>12000){
        leftKey="d";rightKey="a";upKey="s";downKey="w";
      }
      let dx=0,dy=0;
      if(keys[leftKey])dx-=1;
      if(keys[rightKey])dx+=1;
      if(keys[upKey])dy-=1;
      if(keys[downKey])dy+=1;
      const moving=Math.abs(dx)+Math.abs(dy)>0;
      if(moving)dodgeStillTime=0;
      else dodgeStillTime+=dt;
      if(!moving&&dodgeStillTime>1200){
        player.stamina=Math.min(player.staminaMax,player.stamina+dt*0.025);
        updateBars();
      }
      if(lbFinalHealsUsed<3&&dodgeTimer>lbFinalNextHeal){
        const heal=12;
        player.hp=Math.min(player.maxHp,player.hp+heal);
        lbFinalHealsUsed++;
        lbFinalNextHeal+=4000;
        log(`Your determination heals you for ${heal} HP during the finale.`);
        updateBars();
      }
      const len=Math.hypot(dx,dy)||1;
      soul.x+=dx/len*soul.speed*1.2;
      soul.y+=dy/len*soul.speed*1.2;
      soul.x=Math.max(dodgeBox.x+soul.r,Math.min(dodgeBox.x+dodgeBox.w-soul.r,soul.x));
      soul.y=Math.max(dodgeBox.y+soul.r,Math.min(dodgeBox.y+dodgeBox.h-soul.r,soul.y));
      bullets.forEach(b=>{
        if(dodgeTimer>=b.delay){
          b.x+=b.vx;
          b.y+=b.vy
        }
      });
      if(Math.random()<0.08){
        const extraPattern=randomFrom(["lb3Wave1","lb3Wave2","lb3Jump1","lb3Jump2","lb3Spiral1","lb3Spiral2","lb3Wing1","lb3Wing2","lb3Chaos2"]);
        spawnPattern(extraPattern);
      }
      let hits=0;
      bullets.forEach(b=>{
        if(dodgeTimer<b.delay)return;
        if(rectCircleCollide(b.x,b.y,b.w,b.h,soul.x,soul.y,soul.r)){
          if(b.type==="blue"&&moving)hits++;
          else if(b.type==="orange"&&!moving)hits++;
          else if(b.type==="white")hits++;
          b.x=-9999;
          b.y=-9999
        }
      });
      if(hits>0){
        const perHit=enemy.atk*1.3;
        const total=perHit*hits;
        player.hp-=total;
        player.stamina=Math.max(0,player.stamina-total*0.5);
        log(`Finale hits you ${hits} time(s) for ${Math.round(total)} damage!`);
        updateBars();
        if(player.hp<=0){
          player.hp=0;
          updateBars();
          dodgeActive=false;
          endBattle("enemy");
          return
        }
      }
      clearCanvas();
      applyCamera();
      drawCharacters();
      ctx.strokeStyle="white";
      ctx.strokeRect(dodgeBox.x,dodgeBox.y,dodgeBox.w,dodgeBox.h);
      bullets.forEach(b=>{
        if(dodgeTimer>=b.delay){
          ctx.fillStyle=b.color;
          ctx.fillRect(b.x,b.y,b.w,b.h)
        }
      });
      ctx.fillStyle="red";
      ctx.beginPath();
      ctx.arc(soul.x,soul.y,soul.r,0,Math.PI*2);
      ctx.fill();
      const remaining=Math.max(0,dodgeDuration-dodgeTimer);
      const ratio=remaining/dodgeDuration;
      ctx.fillStyle="yellow";
      ctx.fillRect(dodgeBox.x,dodgeBox.y-10,dodgeBox.w*ratio,6);
      ctx.fillStyle="white";
      ctx.font="18px Courier New";
      ctx.fillText("W I N G D I N G S",dodgeBox.x+140,dodgeBox.y+20);
      if(dodgeTimer>=dodgeDuration){
        dodgeActive=false;
        enemy.finalDone=true;
        showSpareChoice();
        return
      }
      requestAnimationFrame(()=>animateFinalLB())
    }
    function showSpareChoice(){
      state="spareChoice";
      menu.innerHTML="";
      log("Last Breath Sans is exhausted. You feel something change.");
      const info=document.createElement("div");
      info.className="centerText";
      info.innerHTML="<div>Only two options remain.</div>";
      menu.appendChild(info);
      const fightBtn=document.createElement("button");
      fightBtn.textContent="FIGHT";
      fightBtn.onclick=()=>{
        log("You strike down Last Breath Sans.");
        enemy.hp=0;
        updateBars();
        endBattle("player")
      };
      menu.appendChild(fightBtn);
      const mercyBtn=document.createElement("button");
      mercyBtn.textContent="MERCY";
      mercyBtn.onclick=()=>{
        enemy.finalDone=true;
        playerMercy()
      };
      menu.appendChild(mercyBtn)
    }
    function showAUSelection(){
      state="chooseAU";
      clearCanvas();
      clearLog();
      menu.innerHTML="";
      const title=document.createElement("div");
      title.className="title";
      title.textContent="SANS AU SIMULATOR - MULTIVERSAL EX++";
      menu.appendChild(title);
      const subtitle=document.createElement("div");
      subtitle.className="subtitle";
      subtitle.textContent="Choose your Sans AU. Then face another Sans from a different timeline.";
      menu.appendChild(subtitle);
      Object.keys(AUs).forEach(name=>{
        const btn=document.createElement("button");
        btn.className="auButton";
        btn.textContent=name;
        const data=AUs[name];
        btn.style.borderColor=data.color||"white";
        btn.onclick=()=>startGameWithAU(name);
        menu.appendChild(btn)
      });
      const hint=document.createElement("div");
      hint.className="small centerText";
      hint.textContent="Controls: W A S D to dodge. Blue bones hurt only when moving; orange bones hurt only when still.";
      menu.appendChild(hint);
      playerNameEl.textContent="-";
      enemyNameEl.textContent="-";
      enemyPhaseEl.textContent="";
      playerHpBar.style.width="0%";
      enemyHpBar.style.width="0%";
      playerHpText.textContent="";
      enemyHpText.textContent="";
      playerStaminaBar.style.width="0%";
      enemyStaminaBar.style.width="0%";
      playerStaminaText.textContent="";
      enemyStaminaText.textContent="";
      playerStatsEl.textContent="";
      enemyStatsEl.textContent="";
      playerItemsEl.textContent="";
      enemyItemsEl.textContent=""
    }
    function startGameWithAU(playerAUName){
      const base=AUs[playerAUName];
      if(playerAUName==="Last Breath Sans"){
        player={
          name:playerAUName,
          maxHp:base.maxHpPhase[0],
          hp:base.maxHpPhase[0],
          atk:base.atkPhase[0],
          dodge:base.dodgePhase[0],
          crit:base.critPhase[0],
          color:base.color,
          specialName:base.specialNamePhase[0],
          specialCost:base.specialCostPhase[0],
          healName:base.healName,
          healPower:base.healPower,
          healUses:base.healUses,
          staminaMax:base.staminaMaxPhase[0],
          stamina:base.staminaMaxPhase[0],
          basePattern:base.basePatternPhase[0],
          patterns:base.patternsPhase[0],
          isLastBreath:false,
          isLastBreathPlayer:true,
          lives:3
        };
      }else{
        player={
          name:playerAUName,
          maxHp:base.maxHp||base.maxHpPhase[0],
          hp:base.maxHp||base.maxHpPhase[0],
          atk:base.atk||base.atkPhase[0],
          dodge:base.dodge||base.dodgePhase[0],
          crit:base.crit||base.critPhase[0],
          color:base.color,
          specialName:base.specialName||base.specialNamePhase[0],
          specialCost:base.specialCost||base.specialCostPhase[0],
          healName:base.healName,
          healPower:base.healPower,
          healUses:base.healUses,
          staminaMax:base.staminaMax||base.staminaMaxPhase[0],
          stamina:base.staminaMax||base.staminaMaxPhase[0],
          basePattern:base.basePattern||base.basePatternPhase[0],
          patterns:base.patterns||base.patternsPhase[0],
          isLastBreath:false,
          isLastBreathPlayer:false,
          lives:1
        };
      }
      const enemyNames=Object.keys(AUs).filter(n=>n!==playerAUName);
      const enemyName=enemyNames[Math.floor(Math.random()*enemyNames.length)];
      const eBase=AUs[enemyName];
      if(enemyName==="Last Breath Sans"){
        enemy={
          name:enemyName,
          base:eBase,
          phase:1,
          maxHp:eBase.maxHpPhase[0],
          hp:eBase.maxHpPhase[0],
          atk:eBase.atkPhase[0],
          dodge:eBase.dodgePhase[0],
          crit:eBase.critPhase[0],
          color:eBase.color,
          specialName:eBase.specialNamePhase[0],
          specialCost:eBase.specialCostPhase[0],
          healName:eBase.healName,
          healPower:eBase.healPower,
          healUses:eBase.healUses,
          staminaMax:eBase.staminaMaxPhase[0],
          stamina:eBase.staminaMaxPhase[0],
          basePattern:eBase.basePatternPhase[0],
          patterns:eBase.patternsPhase[0],
          isLastBreath:true,
          finalDone:false,
          desperationUsed:false
        }
      }else{
        enemy={
          name:enemyName,
          maxHp:eBase.maxHp,
          hp:eBase.maxHp,
          atk:eBase.atk,
          dodge:eBase.dodge,
          crit:eBase.crit,
          color:eBase.color,
          specialName:eBase.specialName,
          specialCost:eBase.specialCost,
          healName:eBase.healName,
          healPower:eBase.healPower,
          healUses:eBase.healUses,
          staminaMax:eBase.staminaMax,
          stamina:eBase.staminaMax,
          basePattern:eBase.basePattern,
          patterns:eBase.patterns,
          isLastBreath:false,
          finalDone:false,
          desperationUsed:false
        }
      }
      playerNameEl.textContent=player.name;
      enemyNameEl.textContent=enemy.name;
      turn=1;
      clearLog();
      log(`A new multiversal battle begins: ${player.name} vs ${enemy.name}!`);
      drawCharacters();
      updateBars();
      setTimeout(showPlayerMenu,900)
    }
    showAUSelection();
  </script>
