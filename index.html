<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EToH Style RNG Menu</title>
<style>
    * {
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        margin: 0;
        background: #0a0a14;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .screen {
        display: none;
        text-align: center;
        width: 100%;
        max-width: 500px;
        padding: 20px;
    }

    .active {
        display: block;
    }

    h1 {
        margin-bottom: 20px;
        letter-spacing: 2px;
    }

    button {
        width: 80%;
        padding: 14px;
        margin: 8px 0;
        font-size: 1.2rem;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #1e1e2e;
        color: white;
        transition: 0.15s;
    }

    button:hover {
        background: #34344a;
    }

    .backBtn {
        margin-top: 25px;
        background: #444;
    }

    /* RNG result */
    .rarity {
        font-size: 2rem;
        margin-top: 20px;
    }

    .common { color: #b0b0b0; }
    .uncommon { color: #5cff8d; }
    .rare { color: #4bb6ff; }
    .legendary { color: #ffdf4b; }
    .mythic { color: #ff4bff; }

</style>
</head>
<body>

<!-- MAIN MENU -->
<div id="menu" class="screen active">
    <h1>Main Menu</h1>
    <button onclick="openScreen('roll')">ROLL</button>
    <button onclick="openScreen('settings')">SETTINGS</button>
    <button onclick="openScreen('credits')">CREDITS</button>
    <button onclick="openScreen('index')">INDEX</button>
    <button onclick="openScreen('shop')">SHOP</button>
    <button onclick="exitGame()">EXIT</button>
</div>

<!-- ROLL SCREEN -->
<div id="roll" class="screen">
    <h1>Roll RNG</h1>
    <button onclick="rollRNG()">ROLL NOW</button>
    <div id="rollResult" class="rarity"></div>
    <button class="backBtn" onclick="openScreen('menu')">BACK</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
    <h1>Settings</h1>
    <p>Nothing here yet…</p>
    <button class="backBtn" onclick="openScreen('menu')">BACK</button>
</div>

<!-- CREDITS -->
<div id="credits" class="screen">
    <h1>Credits</h1>
    <p>Made by: You 😎</p>
    <p>Code by: Copilot</p>
    <button class="backBtn" onclick="openScreen('menu')">BACK</button>
</div>

<!-- INDEX -->
<div id="index" class="screen">
    <h1>Rarity Index</h1>

    <h3>Easy:</h3>
    <p>Common – 70%</p>
    <p>Uncommon – 20%</p>

    <h3>Medium:</h3>
    <p>Rare – 7%</p>

    <h3>Hard:</h3>
    <p>Legendary – 2%</p>
    <p>Mythic – 1%</p>

    <button class="backBtn" onclick="openScreen('menu')">BACK</button>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
    <h1>Shop</h1>
    <p>Coming soon…</p>
    <button class="backBtn" onclick="openScreen('menu')">BACK</button>
</div>

<script>
    function openScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function exitGame() {
        alert("You can't exit a webpage, but nice try 😄");
    }

    // RNG SYSTEM
    const rarities = [
        { name: "Common", key: "common", chance: 70 },
        { name: "Uncommon", key: "uncommon", chance: 20 },
        { name: "Rare", key: "rare", chance: 7 },
        { name: "Legendary", key: "legendary", chance: 2 },
        { name: "Mythic", key: "mythic", chance: 1 }
    ];

    function rollRNG() {
        const roll = Math.random() * 100;
        let cumulative = 0;
        let result = rarities[0];

        for (const r of rarities) {
            cumulative += r.chance;
            if (roll <= cumulative) {
                result = r;
                break;
            }
        }

        const div = document.getElementById("rollResult");
        div.className = "rarity " + result.key;
        div.textContent = result.name + " (" + result.chance + "%)";
    }
</script>

</body>
</html>
