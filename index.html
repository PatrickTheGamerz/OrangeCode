<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Bonetale HTML</title>
<style>
html,body{margin:0;padding:0;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;overflow:hidden}
#ui{position:fixed;top:10px;left:10px;z-index:10;font-size:14px}
#ui span{margin-right:15px}
#gameCanvas{background:linear-gradient(#111 60%,#333 60%);display:block;margin:0 auto;border:2px solid #444}
#overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);color:#fff;font-size:20px;flex-direction:column}
button{padding:8px 16px;margin-top:10px;background:#444;border:none;color:#fff;cursor:pointer}
button:hover{background:#666}
</style>
</head>
<body>
<div id="ui">
<span>HP: <span id="hpText">100</span></span>
<span>Phase: <span id="phaseText">1</span></span>
<span>Score: <span id="scoreText">0</span></span>
<span>Controls: A/D move, W jump, J bones, K blaster, L gravity</span>
</div>
<canvas id="gameCanvas" width="960" height="540"></canvas>
<div id="overlay">
<div id="overlayText">Mini Bonetale-like Arena</div>
<div style="font-size:14px;margin-top:6px">Survive and hit the human soul. Phases get harder.</div>
<button id="startBtn">Start</button>
</div>
<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
const hpText=document.getElementById("hpText");
const phaseText=document.getElementById("phaseText");
const scoreText=document.getElementById("scoreText");
const overlay=document.getElementById("overlay");
const overlayText=document.getElementById("overlayText");
const startBtn=document.getElementById("startBtn");
const keys={};
let lastTime=0;
let player,enemy,projectiles,bones,enemyAttacks,gravityDir,phase,score,gameOver,started,phaseTimer,blasterBeams,shakeTime,shakeIntensity;
const GROUND_Y=420;
const GRAVITY=0.7;
const PLAYER_SPEED=4;
const JUMP_FORCE=-13;
const MAX_HP=100;
const ENEMY_SOUL_SIZE=26;
const BONE_SPEED=9;
const ENEMY_ATTACK_INTERVAL_BASE=1600;
const BLASTER_COOLDOWN=2600;
const BONE_COOLDOWN=260;
const GRAVITY_COOLDOWN=4500;
const PHASE_DURATION=26000;
const BLASTER_BEAM_TIME=550;
const SHAKE_DECAY=0.9;
window.addEventListener("keydown",e=>{keys[e.key.toLowerCase()]=true;if([" ","arrowup","arrowdown","arrowleft","arrowright"].includes(e.key.toLowerCase()))e.preventDefault()});
window.addEventListener("keyup",e=>{keys[e.key.toLowerCase()]=false});
startBtn.onclick=()=>{startGame()};
function startGame(){
player={x:canvas.width*0.25,y:GROUND_Y-60,w:40,h:60,vx:0,vy:0,onGround:false,hp:MAX_HP,face:1,lastBone:0,lastBlaster:0,lastGravity:0};
enemy={x:canvas.width*0.7,y:GROUND_Y-ENEMY_SOUL_SIZE,vx:0,vy:0,w:ENEMY_SOUL_SIZE,h:ENEMY_SOUL_SIZE,hp:200,dir:-1,patternTime:0};
projectiles=[];
bones=[];
enemyAttacks=[];
blasterBeams=[];
gravityDir=1;
phase=1;
score=0;
gameOver=false;
started=true;
phaseTimer=0;
shakeTime=0;
shakeIntensity=0;
overlay.style.display="none";
lastTime=performance.now();
requestAnimationFrame(loop);
}
function loop(timestamp){
if(!started)return;
const dt=timestamp-lastTime;
lastTime=timestamp;
update(dt);
draw();
if(!gameOver)requestAnimationFrame(loop);
}
function update(dt){
phaseTimer+=dt;
if(phaseTimer>PHASE_DURATION){
phaseTimer=0;
phase++;
if(phase>4)phase=4;
}
hpText.textContent=Math.max(0,Math.floor(player.hp));
phaseText.textContent=phase;
scoreText.textContent=score;
handlePlayer(dt);
handleEnemy(dt);
handleProjectiles(dt);
handleEnemyAttacks(dt);
handleBlasterBeams(dt);
checkCollisions();
if(player.hp<=0){
player.hp=0;
endGame(false);
}
if(enemy.hp<=0){
enemy.hp=0;
score+=500;
endGame(true);
}
if(shakeTime>0){
shakeTime-=dt;
shakeIntensity*=SHAKE_DECAY;
if(shakeTime<0)shakeTime=0;
}
}
function handlePlayer(dt){
player.vx=0;
if(keys["a"])player.vx=-PLAYER_SPEED;
if(keys["d"])player.vx=PLAYER_SPEED;
if(keys["w"]&&player.onGround){
player.vy=JUMP_FORCE*gravityDir;
player.onGround=false;
}
player.vy+=GRAVITY*gravityDir;
player.x+=player.vx;
player.y+=player.vy;
if(gravityDir===1){
if(player.y+player.h>GROUND_Y){
player.y=GROUND_Y-player.h;
player.vy=0;
player.onGround=true;
}
if(player.y<40){
player.y=40;
player.vy=0;
}
}else{
if(player.y<40){
player.y=40;
player.vy=0;
player.onGround=true;
}
if(player.y+player.h>GROUND_Y){
player.y=GROUND_Y-player.h;
player.vy=0;
}
}
if(player.x<40)player.x=40;
if(player.x+player.w>canvas.width-40)player.x=canvas.width-40-player.w;
if(player.vx>0)player.face=1;
else if(player.vx<0)player.face=-1;
if(keys["j"])tryShootBone();
if(keys["k"])tryBlaster();
if(keys["l"])tryGravityFlip();
}
function tryShootBone(){
const now=performance.now();
if(now-player.lastBone<BONE_COOLDOWN)return;
player.lastBone=now;
const dir=player.face||1;
bones.push({x:player.x+player.w/2,y:player.y+player.h*0.35,w:26,h:10,vx:BONE_SPEED*dir,vy:0,life:1600});
}
function tryBlaster(){
const now=performance.now();
if(now-player.lastBlaster<BLASTER_COOLDOWN)return;
player.lastBlaster=now;
const dir=player.face||1;
const bx=dir===1?player.x+80:player.x-80;
const by=player.y-40;
blasterBeams.push({x:bx,y:by,w:60,h:120,dir:dir,time:0,warning:true});
shakeTime=400;
shakeIntensity=6;
}
function tryGravityFlip(){
const now=performance.now();
if(now-player.lastGravity<GRAVITY_COOLDOWN)return;
player.lastGravity=now;
gravityDir*=-1;
player.onGround=false;
shakeTime=300;
shakeIntensity=4;
}
function handleEnemy(dt){
enemy.patternTime+=dt;
const speedBase=1.4+phase*0.3;
const targetX=canvas.width*0.6+Math.sin(enemy.patternTime*0.0015)*220;
if(targetX>enemy.x)enemy.vx=speedBase;
else enemy.vx=-speedBase;
enemy.x+=enemy.vx;
if(enemy.x<canvas.width*0.45)enemy.x=canvas.width*0.45;
if(enemy.x>canvas.width*0.9)enemy.x=canvas.width*0.9;
enemy.y=GROUND_Y-ENEMY_SOUL_SIZE-40-Math.sin(enemy.patternTime*0.002)*80;
const interval=Math.max(ENEMY_ATTACK_INTERVAL_BASE-220*phase,550);
if(enemy.patternTime>interval){
enemy.patternTime=0;
spawnEnemyPattern();
}
}
function spawnEnemyPattern(){
const pattern=Math.floor(Math.random()*3);
if(pattern===0)spawnBoneRain();
else if(pattern===1)spawnSoulChase();
else spawnHorizontalBones();
}
function spawnBoneRain(){
const count=6+phase*2;
for(let i=0;i<count;i++){
const delay=i*90;
enemyAttacks.push({type:"fallBone",x:80+Math.random()*(canvas.width-160),y:-40,w:18,h:40,vx:0,vy:3+Math.random()*1.5+phase*0.4,delay:delay,life:6000});
}
}
function spawnSoulChase(){
const dir=player.x>enemy.x?1:-1;
const speed=3.2+phase*0.5;
enemyAttacks.push({type:"chaser",x:enemy.x+enemy.w/2,y:enemy.y+enemy.h/2,w:20,h:20,vx:speed*dir,vy:0,life:5000});
}
function spawnHorizontalBones(){
const lanes=3+Math.min(phase,2);
for(let i=0;i<lanes;i++){
const fromLeft=i%2===0;
const y=GROUND_Y-40-i*40*gravityDir;
const vx=(3.2+phase*0.6)*(fromLeft?1:-1);
enemyAttacks.push({type:"hBone",x:fromLeft?0:canvas.width,y:y,w:30,h:14,vx:vx,vy:0,life:6000});
}
}
function handleProjectiles(dt){
for(let i=projectiles.length-1;i>=0;i--){
const p=projectiles[i];
p.x+=p.vx;
p.y+=p.vy;
p.life-=dt;
if(p.life<=0||p.x<-100||p.x>canvas.width+100||p.y<-100||p.y>canvas.height+100)projectiles.splice(i,1);
}
for(let i=bones.length-1;i>=0;i--){
const b=bones[i];
b.x+=b.vx;
b.y+=b.vy;
b.life-=dt;
if(b.life<=0||b.x<-120||b.x>canvas.width+120)bones.splice(i,1);
}
}
function handleEnemyAttacks(dt){
for(let i=enemyAttacks.length-1;i>=0;i--){
const a=enemyAttacks[i];
if(a.delay&&a.delay>0){
a.delay-=dt;
continue;
}
a.x+=a.vx;
a.y+=a.vy;
a.life-=dt;
if(a.type==="fallBone"){
if(a.y<40)a.y=40;
}
if(a.life<=0||a.x<-160||a.x>canvas.width+160||a.y<-160||a.y>canvas.height+160)enemyAttacks.splice(i,1);
}
}
function handleBlasterBeams(dt){
for(let i=blasterBeams.length-1;i>=0;i--){
const b=blasterBeams[i];
b.time+=dt;
if(b.warning&&b.time>260){
b.warning=false;
b.time=0;
}
if(!b.warning&&b.time>BLASTER_BEAM_TIME){
blasterBeams.splice(i,1);
}
}
}
function rectsOverlap(a,b){
return a.x<a.x+a.w&&b.x<b.x+b.w&&a.x+a.w>b.x&&a.y+a.h>b.y&&b.y+b.h>a.y;
}
function checkCollisions(){
for(let i=bones.length-1;i>=0;i--){
const b=bones[i];
if(b.x<b.x+b.w){
if(b.x<enemy.x+enemy.w&&b.x+b.w>enemy.x&&b.y<enemy.y+enemy.h&&b.y+b.h>enemy.y){
enemy.hp-=8+phase*2;
score+=10;
bones.splice(i,1);
shakeTime=200;
shakeIntensity=3;
}
}
}
for(let i=enemyAttacks.length-1;i>=0;i--){
const a=enemyAttacks[i];
if(a.delay&&a.delay>0)continue;
if(a.x<player.x+player.w&&a.x+a.w>player.x&&a.y<player.y+player.h&&a.y+a.h>player.y){
const dmg=6+phase*2;
player.hp-=dmg;
enemyAttacks.splice(i,1);
shakeTime=260;
shakeIntensity=5;
}
}
for(let i=blasterBeams.length-1;i>=0;i--){
const b=blasterBeams[i];
if(b.warning)continue;
const hitBox={x:b.dir===1?b.x:b.x-b.w,y:b.y,w:b.w,h:b.h};
if(hitBox.x<enemy.x+enemy.w&&hitBox.x+hitBox.w>enemy.x&&hitBox.y<enemy.y+enemy.h&&hitBox.y+hitBox.h>enemy.y){
enemy.hp-=22+phase*4;
score+=40;
}
}
}
function endGame(win){
gameOver=true;
started=false;
overlay.style.display="flex";
overlayText.textContent=win?"You won. Human stopped.":"You died. Genocide succeeded.";
startBtn.textContent="Play again";
}
function draw(){
let offsetX=0,offsetY=0;
if(shakeTime>0){
offsetX=(Math.random()*2-1)*shakeIntensity;
offsetY=(Math.random()*2-1)*shakeIntensity;
}
ctx.save();
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.translate(offsetX,offsetY);
drawBackground();
drawPlayer();
drawEnemy();
drawBones();
drawEnemyAttacks();
drawBlasterBeams();
drawUIBars();
ctx.restore();
}
function drawBackground(){
ctx.fillStyle="#111";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#222";
ctx.fillRect(0,GROUND_Y,canvas.width,canvas.height-GROUND_Y);
ctx.strokeStyle="#333";
ctx.lineWidth=2;
for(let i=0;i<6;i++){
const x=80+i*140;
ctx.beginPath();
ctx.moveTo(x,GROUND_Y);
ctx.lineTo(x,GROUND_Y-80);
ctx.stroke();
}
ctx.fillStyle="#000";
ctx.fillRect(60,60,canvas.width-120,GROUND_Y-100);
ctx.strokeStyle="#555";
ctx.strokeRect(60,60,canvas.width-120,GROUND_Y-100);
}
function drawPlayer(){
ctx.save();
ctx.translate(player.x+player.w/2,player.y+player.h/2);
ctx.scale(1,gravityDir);
ctx.translate(-player.w/2,-player.h/2);
ctx.fillStyle="#fff";
ctx.fillRect(8,0,24,30);
ctx.fillRect(4,26,32,26);
ctx.fillStyle="#00f";
ctx.fillRect(4,26,32,16);
ctx.fillStyle="#fff";
ctx.fillRect(6,28,10,14);
ctx.fillRect(22,28,10,14);
ctx.fillStyle="#000";
ctx.fillRect(10,10,6,4);
ctx.fillRect(24,10,6,4);
ctx.fillRect(16,18,8,3);
ctx.restore();
}
function drawEnemy(){
ctx.save();
ctx.translate(enemy.x+enemy.w/2,enemy.y+enemy.h/2);
ctx.fillStyle="#f00";
ctx.beginPath();
ctx.arc(0,0,enemy.w/2,0,Math.PI*2);
ctx.fill();
ctx.fillStyle="#fff";
ctx.beginPath();
ctx.arc(-5,-4,3,0,Math.PI*2);
ctx.arc(5,-4,3,0,Math.PI*2);
ctx.fill();
ctx.fillStyle="#000";
ctx.fillRect(-4,2,8,2);
ctx.restore();
}
function drawBones(){
ctx.fillStyle="#fff";
for(const b of bones){
ctx.save();
ctx.translate(b.x,b.y);
ctx.fillRect(0,0,b.w,b.h);
ctx.restore();
}
}
function drawEnemyAttacks(){
for(const a of enemyAttacks){
if(a.delay&&a.delay>0)continue;
if(a.type==="fallBone"||a.type==="hBone"){
ctx.fillStyle="#fff";
ctx.fillRect(a.x,a.y,a.w,a.h);
ctx.fillStyle="#ccc";
ctx.fillRect(a.x,a.y,a.w,4);
ctx.fillRect(a.x,a.y+a.h-4,a.w,4);
}else if(a.type==="chaser"){
ctx.fillStyle="#0ff";
ctx.beginPath();
ctx.arc(a.x,a.y,a.w/2,0,Math.PI*2);
ctx.fill();
}
}
}
function drawBlasterBeams(){
for(const b of blasterBeams){
ctx.save();
ctx.translate(b.x,b.y);
ctx.scale(b.dir,1);
ctx.fillStyle="#fff";
ctx.fillRect(-20,-40,40,40);
ctx.fillStyle="#000";
ctx.fillRect(-12,-28,8,6);
ctx.fillRect(4,-28,8,6);
ctx.fillRect(-6,-16,12,4);
if(b.warning){
ctx.globalAlpha=0.4+0.3*Math.sin(b.time*0.02);
ctx.fillStyle="#0ff";
ctx.fillRect(-8,0,16,120);
}else{
ctx.globalAlpha=0.8;
ctx.fillStyle="#0ff";
ctx.fillRect(-10,0,20,140);
ctx.globalAlpha=1;
}
ctx.restore();
}
}
function drawUIBars(){
const hpRatio=Math.max(0,player.hp)/MAX_HP;
const enemyRatio=Math.max(0,enemy.hp)/200;
ctx.fillStyle="#400";
ctx.fillRect(80,30,260,10);
ctx.fillStyle="#f00";
ctx.fillRect(80,30,260*hpRatio,10);
ctx.fillStyle="#044";
ctx.fillRect(canvas.width-340,30,260,10);
ctx.fillStyle="#0ff";
ctx.fillRect(canvas.width-340,30,260*enemyRatio,10);
ctx.fillStyle="#fff";
ctx.font="12px Arial";
ctx.fillText("SANS",80,25);
ctx.fillText("HUMAN",canvas.width-340,25);
}
</script>
</body>
</html>
