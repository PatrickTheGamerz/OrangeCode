<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatWeb AI Generator</title>
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #ff1493;
            --bg-color: #0f0c29;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Animated Background Elements */
       .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite alternate ease-in-out;
        }
       .blob-1 {
            width: 300px; height: 300px;
            background: var(--primary);
            top: 10%; left: 20%;
        }
       .blob-2 {
            width: 400px; height: 400px;
            background: var(--secondary);
            bottom: 10%; right: 20%;
            animation-duration: 12s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Glassmorphism Container */
       .container {
            width: 90%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            z-index: 1;
            animation: slideUp 0.8s ease-out forwards;
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(50px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
        }

       .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1.1rem;
            resize: none;
            outline: none;
            transition: border 0.3s ease;
            box-sizing: border-box;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        button {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            padding: 15px 30px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            align-self: center;
            width: 50%;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 20, 147, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        /* Output Section */
       .output-group {
            margin-top: 30px;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

       .output-group h3 {
            margin-bottom: 10px;
            color: #00c6ff;
        }

        pre {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            overflow-x: auto;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Loading Animation */
       .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

       .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top-color: var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <h1>CatWeb AI Gen</h1>
        <p class="subtitle">Type your idea, and the AI will generate the CatWeb JSON / Text-Script for you!</p>

        <div class="input-group">
            <textarea id="promptInput" placeholder="E.g., Make a button that plays a sound when clicked and loops infinitely..."></textarea>
            <button id="generateBtn" onclick="generateCode()">Generate Site</button>
        </div>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Compiling AI Logic...</p>
        </div>

        <div class="output-group" id="outputGroup">
            <h3>Generated Code:</h3>
            <pre><code id="codeOutput"></code></pre>
            <button onclick="copyCode()" style="width: 100%; margin-top: 15px; font-size: 1rem; padding: 10px;">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        async function generateCode() {
            const prompt = document.getElementById('promptInput').value;
            const loader = document.getElementById('loader');
            const outputGroup = document.getElementById('outputGroup');
            const codeOutput = document.getElementById('codeOutput');

            if (!prompt.trim()) {
                alert("Please enter a prompt first!");
                return;
            }

            // Hide output and show loader
            outputGroup.style.display = 'none';
            loader.style.display = 'block';

            /* 
             * HOW TO CONNECT THIS TO A REAL AI:
             * Replace the setTimeout mock logic below with an actual fetch request 
             * to an AI API (like OpenAI's API or a custom backend you host).
             * 
             * Example AI Prompt you should send:
             * "You are a CatWeb (Roblox) code generator. The user wants:. 
             * Output the code in CatWebCompiler text syntax. 
             * Use commands like play(audio_id), loop {}, wait(seconds), log(string).
             * Remember the 500 actions per second limit, so include wait() in infinite loops."
             */

            try {
                // Simulating an API call with a 2.5 second delay
                await new Promise(resolve => setTimeout(resolve, 2500));

                // Simulated AI Response (Replace this with real API data)
                const mockAIResponse = `// Generated CatWeb Code
// Simulated response based on your prompt: "${prompt}"

loop {
    log("Running CatWeb AI Loop!");
    // Remember the 500 actions per second limit!
    wait(1); 
}`;

                // Display result
                codeOutput.textContent = mockAIResponse;
                loader.style.display = 'none';
                outputGroup.style.display = 'flex';

            } catch (error) {
                console.error("Error generating code:", error);
                alert("Failed to connect to the AI.");
                loader.style.display = 'none';
            }
        }

        function copyCode() {
            const codeText = document.getElementById('codeOutput').textContent;
            navigator.clipboard.writeText(codeText).then(() => {
                alert("CatWeb code copied to clipboard!");
            });
        }
    </script>
</body>
</html>
