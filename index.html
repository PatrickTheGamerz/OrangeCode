<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bonetale-style Sans vs Chara – Corridor</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: sans-serif;
      overflow: hidden;
    }

    #gameContainer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
    }

    canvas {
      border: 2px solid #fff;
      background: #111;
      image-rendering: pixelated;
    }

    #ui {
      margin-top: 8px;
      text-align: center;
      font-size: 14px;
    }

    #controls {
      margin-top: 4px;
      color: #ccc;
    }

    button {
      margin-top: 6px;
      padding: 4px 10px;
      background: #222;
      color: #fff;
      border: 1px solid #555;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="game" width="640" height="360"></canvas>
    <div id="ui">
      <div>
        HP: <span id="hp">1</span> |
        Stamina: <span id="stam">100</span> |
        Time survived: <span id="time">0.0</span>s
      </div>
      <div id="controls">
        Move: A/D or ←/→ &nbsp;|&nbsp;
        Jump: W / ↑ / Space &nbsp;|&nbsp;
        Dash: Shift &nbsp;|&nbsp;
        Shoot bone: J
      </div>
      <button id="restartBtn" style="display:none;">Restart</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const hpEl = document.getElementById("hp");
    const stamEl = document.getElementById("stam");
    const timeEl = document.getElementById("time");
    const restartBtn = document.getElementById("restartBtn");

    const W = canvas.width;
    const H = canvas.height;

    // ===== GAME CONSTANTS =====
    const GRAVITY = 1500;
    const MOVE_SPEED = 220;
    const DASH_SPEED = 420;
    const JUMP_SPEED = -550;
    const FRICTION = 0.85;

    const EXHAUSTED_MOVE_SPEED = 60;   // super slow when 0 stamina
    const EXHAUSTED_JUMP_SPEED = -280;

    const BONE_SPEED = 520;
    const BONE_COST = 8;
    const JUMP_COST = 5;
    const DASH_COST_PER_SEC = 25;

    const STAM_MAX = 100;
    const STAM_REGEN_IDLE = 15; // per second when not doing actions

    const FLOOR_Y = H - 70;

    const PROJ_SPEED_MIN = 220;
    const PROJ_SPEED_MAX = 320;
    const PROJ_INTERVAL = 0.6; // seconds

    // ===== GAME STATE =====
    let keys = {};
    let lastTime = 0;
    let gameOver = false;
    let elapsed = 0;

    const player = {
      x: W / 2 - 16,
      y: FLOOR_Y - 48,
      w: 32,
      h: 48,
      vx: 0,
      vy: 0,
      onGround: false,
      facing: 1,
      hp: 1,
      stamina: STAM_MAX,
      dashing: false,
      exhausted: false
    };

    const chara = {
      x: W / 2 - 16,
      y: 80,
      w: 32,
      h: 48,
      t: 0 // for movement pattern
    };

    const bones = [];
    const projectiles = [];
    let projTimer = 0;

    // ===== INPUT =====
    window.addEventListener("keydown", (e) => {
      keys[e.key.toLowerCase()] = true;
      if (["ArrowLeft", "ArrowRight", "ArrowUp", " "].includes(e.key)) {
        e.preventDefault();
      }
      if (e.key.toLowerCase() === "j" && !gameOver) {
        shootBone();
      }
    });

    window.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    restartBtn.addEventListener("click", () => {
      resetGame();
    });

    // ===== RESET =====
    function resetGame() {
      player.x = W / 2 - 16;
      player.y = FLOOR_Y - 48;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      player.facing = 1;
      player.hp = 1;
      player.stamina = STAM_MAX;
      player.dashing = false;
      player.exhausted = false;

      chara.x = W / 2 - 16;
      chara.y = 80;
      chara.t = 0;

      bones.length = 0;
      projectiles.length = 0;
      projTimer = 0;
      elapsed = 0;
      gameOver = false;
      restartBtn.style.display = "none";

      hpEl.textContent = player.hp;
      stamEl.textContent = Math.round(player.stamina);
      timeEl.textContent = elapsed.toFixed(1);
    }

    // ===== UTILS =====
    function rectsOverlap(a, b) {
      return !(
        a.x + a.w < b.x ||
        a.x > b.x + b.w ||
        a.y + a.h < b.y ||
        a.y > b.y + b.h
      );
    }

    // ===== ACTIONS =====
    function shootBone() {
      if (player.exhausted) return; // too tired
      if (player.stamina <= BONE_COST || gameOver) return;
      player.stamina -= BONE_COST;
      const dir = player.facing || 1;
      bones.push({
        x: player.x + player.w / 2 + dir * 10,
        y: player.y + player.h / 2,
        w: 18,
        h: 6,
        vx: dir * BONE_SPEED
      });
    }

    function spawnProjectile() {
      // projectiles fall from the air, not from Chara directly
      const size = 16;
      const x = 40 + Math.random() * (W - 80);
      const speed =
        PROJ_SPEED_MIN + Math.random() * (PROJ_SPEED_MAX - PROJ_SPEED_MIN);
      projectiles.push({
        x: x,
        y: 0 - size,
        w: size,
        h: size,
        vy: speed
      });
    }

    // ===== UPDATE =====
    function update(dt) {
      if (gameOver) return;

      elapsed += dt;
      timeEl.textContent = elapsed.toFixed(1);

      let moveLeft = keys["a"] || keys["arrowleft"];
      let moveRight = keys["d"] || keys["arrowright"];
      let jumpKey = keys["w"] || keys["arrowup"] || keys[" "];
      let dashKey = keys["shift"];

      let doingAction = false;

      // Exhausted state check
      player.exhausted = player.stamina <= 0.1;

      // Horizontal movement
      if (moveLeft && !moveRight) {
        if (player.exhausted) {
          player.vx = -EXHAUSTED_MOVE_SPEED;
        } else {
          player.vx = -MOVE_SPEED;
        }
        player.facing = -1;
        doingAction = true;
      } else if (moveRight && !moveLeft) {
        if (player.exhausted) {
          player.vx = EXHAUSTED_MOVE_SPEED;
        } else {
          player.vx = MOVE_SPEED;
        }
        player.facing = 1;
        doingAction = true;
      } else {
        player.vx *= FRICTION;
        if (Math.abs(player.vx) < 5) player.vx = 0;
      }

      // Dash (only if not exhausted)
      if (dashKey && !player.exhausted && player.stamina > 0) {
        player.dashing = true;
        const dashDir = player.facing || 1;
        player.vx = dashDir * DASH_SPEED;
        player.stamina -= DASH_COST_PER_SEC * dt;
        doingAction = true;
      } else {
        player.dashing = false;
      }

      // Jump
      if (jumpKey && player.onGround) {
        if (player.exhausted) {
          // weak jump, no stamina cost
          player.vy = EXHAUSTED_JUMP_SPEED;
        } else if (player.stamina > JUMP_COST) {
          player.vy = JUMP_SPEED;
          player.stamina -= JUMP_COST;
          doingAction = true;
        }
        player.onGround = false;
      }

      // Gravity
      player.vy += GRAVITY * dt;

      // Apply velocity
      player.x += player.vx * dt;
      player.y += player.vy * dt;

      // Floor
      if (player.y + player.h > FLOOR_Y) {
        player.y = FLOOR_Y - player.h;
        player.vy = 0;
        player.onGround = true;
      }

      // Walls (corridor)
      const leftWall = 80;
      const rightWall = W - 80;
      if (player.x < leftWall) player.x = leftWall;
      if (player.x + player.w > rightWall) player.x = rightWall - player.w;

      // Stamina regen when idle (and not exhausted forever)
      if (!doingAction && player.stamina < STAM_MAX) {
        player.stamina += STAM_REGEN_IDLE * dt;
      }
      if (player.stamina > STAM_MAX) player.stamina = STAM_MAX;
      if (player.stamina < 0) player.stamina = 0;

      // Update bones
      for (let i = bones.length - 1; i >= 0; i--) {
        const b = bones[i];
        b.x += b.vx * dt;
        if (b.x < -50 || b.x > W + 50) {
          bones.splice(i, 1);
        }
      }

      // Chara floating movement (just vibe)
      chara.t += dt;
      chara.x = W / 2 - 16 + Math.sin(chara.t * 0.8) * 80;
      chara.y = 70 + Math.sin(chara.t * 1.3) * 10;

      // Projectile spawn
      projTimer += dt;
      if (projTimer >= PROJ_INTERVAL) {
        projTimer = 0;
        spawnProjectile();
      }

      // Update projectiles
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.y += p.vy * dt;
        if (p.y > H + 40) {
          projectiles.splice(i, 1);
          continue;
        }
      }

      // Bones vs Chara (just knockback visual)
      for (let i = bones.length - 1; i >= 0; i--) {
        const b = bones[i];
        if (rectsOverlap(b, chara)) {
          chara.x += (b.vx > 0 ? 1 : -1) * 4;
          bones.splice(i, 1);
        }
      }

      // Projectiles vs player
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        if (rectsOverlap(p, player)) {
          projectiles.splice(i, 1);
          player.hp -= 1;
          hpEl.textContent = player.hp;
          if (player.hp <= 0) {
            endGame("Sans took a hit...");
          }
        }
      }

      // Clamp chara inside corridor
      if (chara.x < leftWall + 10) chara.x = leftWall + 10;
      if (chara.x + chara.w > rightWall - 10)
        chara.x = rightWall - 10 - chara.w;

      // Update UI
      stamEl.textContent = Math.round(player.stamina);
    }

    function endGame(reason) {
      if (gameOver) return;
      gameOver = true;
      restartBtn.style.display = "inline-block";
      // console.log(reason);
    }

    // ===== DRAW =====
    function drawCorridorBackground() {
      // Dark walls
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);

      // Floor (golden-ish like last corridor)
      ctx.fillStyle = "#c9a24b";
      ctx.fillRect(0, FLOOR_Y, W, H - FLOOR_Y);

      // Side walls
      ctx.fillStyle = "#444";
      ctx.fillRect(0, 0, 80, H);
      ctx.fillRect(W - 80, 0, 80, H);

      // Back wall line
      ctx.fillStyle = "#555";
      ctx.fillRect(80, FLOOR_Y, W - 160, 4);

      // Simple perspective lines on floor
      ctx.strokeStyle = "#b58b3a";
      ctx.lineWidth = 1;
      for (let i = 0; i < 6; i++) {
        const y = FLOOR_Y + i * 12;
        ctx.beginPath();
        ctx.moveTo(80, y);
        ctx.lineTo(W - 80, y);
        ctx.stroke();
      }

      // Pillars (very simple)
      ctx.fillStyle = "#777";
      ctx.fillRect(90, 40, 20, FLOOR_Y - 40);
      ctx.fillRect(W - 110, 40, 20, FLOOR_Y - 40);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      drawCorridorBackground();

      // Sans (player)
      ctx.save();
      ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
      ctx.scale(player.facing, 1);

      // Body
      ctx.fillStyle = "#fff";
      ctx.fillRect(-8, -16, 16, 32);

      // Head
      ctx.beginPath();
      ctx.arc(0, -26, 10, 0, Math.PI * 2);
      ctx.fill();

      // Eyes (one tired if exhausted)
      ctx.fillStyle = "#000";
      if (player.exhausted) {
        ctx.fillRect(-5, -28, 3, 2);
        ctx.fillRect(2, -30, 3, 3);
      } else {
        ctx.fillRect(-5, -30, 3, 3);
        ctx.fillRect(2, -30, 3, 3);
      }

      // Mouth
      ctx.fillRect(-4, -22, 8, 2);

      ctx.restore();

      // Chara (floating)
      ctx.fillStyle = "#f33";
      ctx.fillRect(chara.x, chara.y, chara.w, chara.h);
      ctx.fillStyle = "#000";
      ctx.fillRect(chara.x + 6, chara.y + 10, 6, 6);
      ctx.fillRect(chara.x + chara.w - 12, chara.y + 10, 6, 6);
      ctx.fillRect(chara.x + 8, chara.y + chara.h - 10, chara.w - 16, 4);

      // Bones (Sans attack)
      for (const b of bones) {
        ctx.fillStyle = "#fff";
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.fillRect(b.x - 4, b.y - 2, 4, 10);
        ctx.fillRect(b.x + b.w, b.y - 2, 4, 10);
      }

      // Projectiles from air
      for (const p of projectiles) {
        ctx.fillStyle = "#f00";
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = "#900";
        ctx.fillRect(p.x + 4, p.y + 4, p.w - 8, p.h - 8);
      }

      // UI bars (HP and stamina)
      // HP bar
      ctx.fillStyle = "#444";
      ctx.fillRect(20, 20, 100, 10);
      ctx.fillStyle = player.hp > 0 ? "#0f0" : "#400";
      ctx.fillRect(20, 20, (player.hp / 1) * 100, 10);

      // Stamina bar
      ctx.fillStyle = "#444";
      ctx.fillRect(20, 40, 150, 10);
      ctx.fillStyle = player.exhausted ? "#088" : "#0ff";
      ctx.fillRect(20, 40, (player.stamina / STAM_MAX) * 150, 10);

      // Game over overlay
      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#fff";
        ctx.font = "28px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", W / 2, H / 2 - 10);
        ctx.font = "18px sans-serif";
        ctx.fillText("Time survived: " + elapsed.toFixed(1) + "s", W / 2, H / 2 + 20);
        ctx.fillText("Click Restart below to try again", W / 2, H / 2 + 50);
      }
    }

    // ===== MAIN LOOP =====
    function loop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      update(dt);
      draw();

      requestAnimationFrame(loop);
    }

    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
