<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sans AU Simulator</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #game {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    canvas {
      border: 4px solid white;
      background: #111;
    }
    .menu {
      margin-top: 20px;
    }
    button {
      background: black;
      color: white;
      border: 2px solid white;
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    .log {
      margin-top: 10px;
      max-height: 150px;
      overflow-y: auto;
      width: 600px;
      text-align: left;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="game">
    <canvas id="battle" width="600" height="300"></canvas>
    <div class="menu" id="menu"></div>
    <div class="log" id="log"></div>
  </div>

  <script>
    const canvas = document.getElementById('battle');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('menu');
    const log = document.getElementById('log');

    const AUs = {
      "Classic Sans": { hp: 100, atk: 15, dodge: 0.2, color: "white" },
      "Underfell Sans": { hp: 120, atk: 20, dodge: 0.1, color: "red" },
      "Dusttale Sans": { hp: 80, atk: 30, dodge: 0.15, color: "darkred" },
      "Ink Sans": { hp: 90, atk: 18, dodge: 0.25, color: "cyan" },
      "Error Sans": { hp: 110, atk: 22, dodge: 0.2, color: "purple" }
    };

    let player = null;
    let enemy = null;

    function logMsg(msg) {
      const p = document.createElement('p');
      p.textContent = msg;
      log.appendChild(p);
      log.scrollTop = log.scrollHeight;
    }

    function drawBattle() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = player.color;
      ctx.fillRect(50, 200, 50, 50);
      ctx.fillStyle = enemy.color;
      ctx.fillRect(500, 50, 50, 50);
      ctx.fillStyle = "white";
      ctx.font = "16px Courier New";
      ctx.fillText(`${player.name} HP: ${player.hp}`, 20, 20);
      ctx.fillText(`${enemy.name} HP: ${enemy.hp}`, 400, 20);
    }

    function attack(attacker, defender) {
      if (Math.random() < defender.dodge) {
        logMsg(`${defender.name} dodged the attack!`);
        return;
      }
      const damage = Math.floor(attacker.atk + Math.random() * 10 - 5);
      defender.hp -= damage;
      logMsg(`${attacker.name} hits ${defender.name} for ${damage} damage!`);
    }

    function checkWin() {
      if (player.hp <= 0) {
        logMsg("You lost! Refresh to try again.");
        menu.innerHTML = '';
        return true;
      }
      if (enemy.hp <= 0) {
        logMsg("You won! Refresh to try again.");
        menu.innerHTML = '';
        return true;
      }
      return false;
    }

    function playerTurn() {
      drawBattle();
      menu.innerHTML = '';
      const attackBtn = document.createElement('button');
      attackBtn.textContent = "Attack";
      attackBtn.onclick = () => {
        attack(player, enemy);
        if (!checkWin()) setTimeout(enemyTurn, 1000);
      };
      menu.appendChild(attackBtn);
    }

    function enemyTurn() {
      attack(enemy, player);
      if (!checkWin()) setTimeout(playerTurn, 1000);
    }

    function startBattle() {
      drawBattle();
      logMsg(`Battle Start! ${player.name} vs ${enemy.name}`);
      setTimeout(playerTurn, 1000);
    }

    function chooseAU() {
      menu.innerHTML = '<p>Choose your Sans:</p>';
      for (let name in AUs) {
        const btn = document.createElement('button');
        btn.textContent = name;
        btn.onclick = () => {
          player = { ...AUs[name], name };
          const enemyNames = Object.keys(AUs).filter(n => n !== name);
          const enemyName = enemyNames[Math.floor(Math.random() * enemyNames.length)];
          enemy = { ...AUs[enemyName], name: enemyName };
          startBattle();
        };
        menu.appendChild(btn);
      }
    }

    chooseAU();
  </script>
</body>
</html>
