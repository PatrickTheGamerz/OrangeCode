<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EToH-style RNG</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1b1b2f 0, #050510 55%, #000 100%);
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 24px 32px;
      background: rgba(10, 10, 25, 0.9);
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      max-width: 420px;
      width: 100%;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f5f5ff;
    }

    .subtitle {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    button {
      margin-top: 10px;
      padding: 12px 28px;
      font-size: 1rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #ff4b8b, #ffb347);
      color: #111;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      box-shadow: 0 0 18px rgba(255, 75, 139, 0.6);
      transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
    }

    button:active {
      transform: scale(0.96);
      box-shadow: 0 0 8px rgba(255, 75, 139, 0.4);
      filter: brightness(0.9);
    }

    .result {
      margin-top: 24px;
      min-height: 80px;
    }

    .rarity-name {
      font-size: 1.6rem;
      font-weight: 700;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
    }

    .rarity-tag {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(0, 0, 0, 0.3);
    }

    .chance {
      margin-top: 4px;
      font-size: 0.8rem;
      opacity: 0.7;
    }

    .history {
      margin-top: 20px;
      font-size: 0.8rem;
      text-align: left;
      max-height: 120px;
      overflow-y: auto;
      padding-right: 4px;
      opacity: 0.85;
    }

    .history-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.6;
      margin-bottom: 4px;
    }

    .history-item {
      margin-bottom: 2px;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    /* Rarity colors */
    .common { color: #b0b0b0; }
    .uncommon { color: #5cff8d; }
    .rare { color: #4bb6ff; }
    .legendary { color: #ffdf4b; }
    .mythic { color: #ff4bff; }

    .glow {
      animation: glow 0.7s ease-out;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 0 rgba(255, 255, 255, 0); transform: scale(1); }
      40% { text-shadow: 0 0 24px rgba(255, 255, 255, 0.9); transform: scale(1.08); }
      100% { text-shadow: 0 0 10px rgba(255, 255, 255, 0.4); transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>EToH RNG</h1>
    <div class="subtitle">Click to roll and see what rarity you pull.</div>

    <button id="rollBtn">Roll</button>

    <div class="result" id="result">
      <!-- Result appears here -->
    </div>

    <div class="history" id="history">
      <div class="history-title">Recent rolls</div>
      <!-- History items -->
    </div>
  </div>

  <script>
    // Define rarities and their chances (sum = 100)
    const rarities = [
      { name: "Common",    key: "common",    chance: 70 },
      { name: "Uncommon",  key: "uncommon",  chance: 20 },
      { name: "Rare",      key: "rare",      chance: 7  },
      { name: "Legendary", key: "legendary", chance: 2  },
      { name: "Mythic",    key: "mythic",    chance: 1  }
    ];

    const rollBtn = document.getElementById("rollBtn");
    const resultDiv = document.getElementById("result");
    const historyDiv = document.getElementById("history");

    function rollRarity() {
      const roll = Math.random() * 100;
      let cumulative = 0;

      for (const r of rarities) {
        cumulative += r.chance;
        if (roll <= cumulative) {
          return r;
        }
      }
      // Fallback (shouldn't really happen if chances sum to 100)
      return rarities[0];
    }

    function addToHistory(rarity) {
      const item = document.createElement("div");
      item.className = "history-item " + rarity.key;
      const time = new Date().toLocaleTimeString();
      item.textContent = `[${time}] ${rarity.name}`;
      historyDiv.appendChild(item);

      // Keep last 20 rolls
      const items = historyDiv.querySelectorAll(".history-item");
      if (items.length > 20) {
        historyDiv.removeChild(items[0]);
      }
    }

    rollBtn.addEventListener("click", () => {
      const rarity = rollRarity();

      resultDiv.innerHTML = `
        <div class="rarity-name ${rarity.key} glow">${rarity.name}</div>
        <div class="rarity-tag">${rarity.key.toUpperCase()}</div>
        <div class="chance">Chance: ${rarity.chance}%</div>
      `;

      // retrigger glow animation
      const nameEl = resultDiv.querySelector(".rarity-name");
      nameEl.classList.remove("glow");
      void nameEl.offsetWidth; // force reflow
      nameEl.classList.add("glow");

      addToHistory(rarity);
    });
  </script>
</body>
</html>
