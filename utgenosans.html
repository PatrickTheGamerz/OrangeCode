<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undertale | Sans</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier Prime', monospace; overflow: hidden; user-select: none; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; width: 640px; height: 480px; background: #000; box-shadow: 0 0 20px rgba(255,255,255,0.1); border: 2px solid #222; }
        canvas { display: block; image-rendering: pixelated; }
        
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* Dialogue Box */
        #dialogue-box { position: absolute; top: 40px; left: 380px; width: 220px; background: #fff; color: #000; padding: 15px; border-radius: 12px; font-size: 14px; font-weight: bold; display: none; z-index: 50; line-height: 1.2; box-shadow: 4px 4px 0 rgba(0,0,0,0.5); border: 3px solid #000;}
        #dialogue-box::before { content: ""; position: absolute; left: -14px; top: 20px; border-width: 10px 14px 10px 0; border-style: solid; border-color: transparent #000 transparent transparent; }
        #dialogue-box::after { content: ""; position: absolute; left: -10px; top: 20px; border-width: 10px 14px 10px 0; border-style: solid; border-color: transparent #fff transparent transparent; }
        .blink-arrow { display: inline-block; animation: blink 1s infinite; margin-left: 5px; color: #f00;}
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

        /* HUD */
        .hud { position: absolute; top: 400px; left: 60px; display: flex; align-items: center; gap: 20px; font-size: 20px; font-weight: bold; width: 100%; }
        .hp-bar-wrap { display: flex; align-items: center; gap: 10px; }
        .hp-bg { width: 130px; height: 20px; background: #800; border: 2px solid #fff; position: relative; }
        .hp-fill { height: 100%; background: #ff0; transition: width 0.1s; }
        .kr-fill { height: 100%; background: #d015d0; position: absolute; top: 0; right: 0; transition: width 0.1s; }
        
        /* Action Buttons */
        .btn-row { position: absolute; bottom: 10px; left: 0; width: 100%; display: flex; justify-content: center; gap: 20px; }
        .action-btn { width: 110px; text-align: center; border: 3px solid #e7762e; color: #e7762e; padding: 4px 0; font-size: 20px; font-weight: bold; }
        .action-btn.active { border-color: #ff0; color: #ff0; }

        /* Game Over */
        #game-over { position: absolute; inset: 0; background: #000; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .go-title { font-size: 50px; font-weight: bold; letter-spacing: 5px; color: #fff; margin-bottom: 20px; opacity: 0; transition: opacity 2s; }
        .go-text { font-size: 16px; color: #aaa; text-align: center; max-w-sm; opacity: 0; transition: opacity 3s 1s; }
        
        #loading-ai { position: absolute; top: 20px; left: 20px; color: #aaa; font-size: 12px; display: none; animation: blink 1s infinite; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="640" height="480"></canvas>
    
    <div class="ui-overlay">
        <div id="loading-ai">* sans is calculating...</div>
        
        <div id="dialogue-box">
            <span id="d-text"></span><span class="blink-arrow" id="d-arrow">▼</span>
        </div>

        <div id="flavor-text" style="position: absolute; top: 265px; left: 135px; width: 370px; font-size: 16px; font-weight: bold; display: block;">
            * You feel your sins crawling on your back.
        </div>

        <div class="hud">
            <div>CHARA <span style="font-size: 14px; font-weight: normal;">LV 19</span></div>
            <div class="hp-bar-wrap">
                <span style="font-size: 12px;">HP</span>
                <div class="hp-bg">
                    <div id="hp-fill" class="hp-fill" style="width: 100%;"></div>
                    <div id="kr-fill" class="kr-fill" style="width: 0%;"></div>
                </div>
                <span id="hp-text">92 / 92</span>
                <span id="kr-label" style="color: #d015d0; font-size: 12px; display: none;">KR</span>
            </div>
        </div>

        <div class="btn-row">
            <div class="action-btn active" id="btn-0">FIGHT</div>
            <div class="action-btn" id="btn-1">ACT</div>
            <div class="action-btn" id="btn-2">ITEM</div>
            <div class="action-btn" id="btn-3">MERCY</div>
        </div>
    </div>

    <div id="game-over">
        <div class="go-title" id="go-title">GAME OVER</div>
        <div class="go-text" id="go-text">
            "you can't give up just yet.<br><br>chara! stay determined..."<br><br>
            <span style="font-size: 12px; margin-top: 20px; display: block; color: #666; cursor: pointer;" onclick="window.location.href='menu.html'">[Return to Menu]</span>
        </div>
    </div>
</div>

<script>
    const apiKey = ""; // Managed by environment
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const hpFill = document.getElementById('hp-fill');
    const krFill = document.getElementById('kr-fill');
    const hpText = document.getElementById('hp-text');
    const krLabel = document.getElementById('kr-label');
    const flavorText = document.getElementById('flavor-text');
    const dialogueBox = document.getElementById('dialogue-box');
    const dText = document.getElementById('d-text');
    const dArrow = document.getElementById('d-arrow');
    const loadingAi = document.getElementById('loading-ai');
    
    // Game State
    let STATE = 'MENU'; // MENU, LOADING, DIALOGUE, BATTLE, ATTACKING, GAMEOVER
    let menuIdx = 0;
    const MAX_HP = 92;
    let hp = MAX_HP;
    let kr = 0;
    let turn = 1;
    let stamina = 100;
    
    // Engine State
    const s = {
        player: { x: 320, y: 320, mode: 'red', vx: 0, vy: 0, gravityDir: 'DOWN', onGround: false, radius: 8 },
        box: { x: 120, y: 250, w: 400, h: 140 },
        projectiles: [],
        platforms: [],
        frame: 0,
        turnDuration: 400,
        shake: 0,
        sansOffset: 0,
        fightBar: { x: 0, dir: 1 },
        keys: {},
        
        // Dialogue System
        dialogueLines: [],
        lineIdx: 0,
        charIdx: 0,
        typing: false,
        
        // Game Over System
        deathState: 0, // 0: alive, 1: heart broke, 2: shattered
        deathTimer: 0,
        deathFragments: []
    };

    // Load Deaths
    let deaths = parseInt(localStorage.getItem('ut_deaths')) || 0;

    // --- Audio System ---
    const Audio = {
        ctx: null,
        init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        play(type) {
            if (!this.ctx) return;
            const t = this.ctx.currentTime;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain); gain.connect(this.ctx.destination);
            
            if (type === 'select') {
                osc.type = 'square'; osc.frequency.setValueAtTime(440, t);
                gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                osc.start(t); osc.stop(t + 0.1);
            } else if (type === 'hit') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.exponentialRampToValueAtTime(50, t + 0.2);
                gain.gain.setValueAtTime(0.15, t); gain.gain.linearRampToValueAtTime(0, t + 0.2);
                osc.start(t); osc.stop(t + 0.2);
            } else if (type === 'voice') {
                osc.type = 'square'; osc.frequency.setValueAtTime(180, t); osc.frequency.linearRampToValueAtTime(160, t + 0.05);
                gain.gain.setValueAtTime(0.08, t); gain.gain.linearRampToValueAtTime(0, t + 0.05);
                osc.start(t); osc.stop(t + 0.05);
            } else if (type === 'slam') {
                osc.type = 'square'; osc.frequency.setValueAtTime(100, t); osc.frequency.exponentialRampToValueAtTime(20, t + 0.2);
                gain.gain.setValueAtTime(0.3, t); gain.gain.linearRampToValueAtTime(0, t + 0.2);
                osc.start(t); osc.stop(t + 0.2);
            } else if (type === 'blaster') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, t); osc.frequency.exponentialRampToValueAtTime(50, t + 0.4);
                gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
                osc.start(t); osc.stop(t + 0.4);
            } else if (type === 'break') {
                osc.type = 'square'; osc.frequency.setValueAtTime(200, t); osc.frequency.linearRampToValueAtTime(150, t + 0.2);
                gain.gain.setValueAtTime(0.3, t); gain.gain.linearRampToValueAtTime(0, t + 0.2);
                osc.start(t); osc.stop(t + 0.2);
            } else if (type === 'shatter') {
                // Noise burst
                const bufferSize = this.ctx.sampleRate * 0.5;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.setValueAtTime(1000, t); filter.frequency.exponentialRampToValueAtTime(100, t + 0.5);
                
                noise.connect(filter); filter.connect(gain);
                gain.gain.setValueAtTime(0.4, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
                noise.start(t); noise.stop(t + 0.5);
            }
        }
    };

    // --- AI ARCHITECTURE ---
    async function fetchAiTurn() {
        if (turn === 1) {
            return {
                dialogue: [
                    "it's a beautiful day outside.",
                    "birds are singing, flowers are blooming...",
                    "on days like these, kids like you...",
                    "s h o u l d  b e  b u r n i n g  i n  h e l l."
                ],
                duration: 400, attacks: [{ type: "STRONG_START", frame: 10 }]
            };
        }

        const prompt = `Turn ${turn}. Player HP: ${hp}/92. Stamina: ${stamina}. Deaths: ${deaths}.
        You are Sans (Genocide). Be cynical, strictly lowercase. Return STRICTLY JSON format:
        {
            "dialogue": ["sentence 1.", "sentence 2."],
            "duration": 450,
            "attacks": [
                {"type": "SLAM", "frame": 10, "dir": "DOWN"},
                {"type": "GAPS", "frame": 50, "count": 4, "speed": 6},
                {"type": "BLASTER_AIM", "frame": 300, "count": 3}
            ]
        }`;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
            });
            const data = await res.json();
            return JSON.parse(data.candidates[0].content.parts[0].text);
        } catch (e) {
            return {
                dialogue: ["you're really pushing it, huh.", "just give up."],
                duration: 350, attacks: [{ type: 'SLAM', frame: 10, dir: 'DOWN' }, { type: 'GAPS', frame: 50, count: 5, speed: 6 }]
            };
        }
    }

    // --- PHYSICS & COLLISION ---
    function takeDamage(isBlueBone = false) {
        if (STATE === 'GAMEOVER') return;
        const moving = Math.abs(s.player.vx) > 0.1 || Math.abs(s.player.vy) > 0.1 || s.keys['KeyW'] || s.keys['KeyA'] || s.keys['KeyS'] || s.keys['KeyD'] || s.keys['ArrowUp'] || s.keys['ArrowDown'] || s.keys['ArrowLeft'] || s.keys['ArrowRight'];
        if (isBlueBone && !moving) return;

        hp = Math.max(0, hp - 1);
        kr = Math.min(MAX_HP - 1, kr + 1);
        if (hp > 0) Audio.play('hit');
        updateHUD();

        if (hp <= 0 && STATE !== 'GAMEOVER') triggerGameOver();
    }

    function slamGravity(dir) {
        s.player.mode = 'blue';
        s.player.gravityDir = dir;
        s.shake = 15;
        Audio.play('slam');
        if (dir === 'DOWN') s.player.vy = 12;
        if (dir === 'UP') s.player.vy = -12;
        if (dir === 'LEFT') s.player.vx = -12;
        if (dir === 'RIGHT') s.player.vx = 12;
    }

    // --- GAME ENGINE LOOP ---
    function update() {
        if (STATE === 'GAMEOVER') {
            updateGameOver();
            return;
        }

        if (STATE === 'DIALOGUE') {
            s.frame++;
            if (s.typing) {
                if (s.frame % 3 === 0 && s.charIdx < s.dialogueLines[s.lineIdx].length) {
                    dText.innerText = s.dialogueLines[s.lineIdx].substring(0, s.charIdx + 1);
                    const char = s.dialogueLines[s.lineIdx][s.charIdx];
                    if (char !== ' ' && char !== '.' && char !== ',') Audio.play('voice');
                    s.charIdx++;
                }
                if (s.charIdx >= s.dialogueLines[s.lineIdx].length) {
                    s.typing = false;
                    dArrow.style.display = 'inline-block';
                }
            }
            return;
        }

        if (STATE === 'ATTACKING') {
            s.fightBar.x += 12 * s.fightBar.dir;
            if (s.fightBar.x > s.box.w || s.fightBar.x < 0) s.fightBar.dir *= -1;
            return;
        }

        if (STATE === 'BATTLE') {
            s.frame++;
            processAttacks(s.frame);

            // Physics Variables
            const speed = s.keys['ShiftLeft'] || s.keys['KeyX'] ? 2.0 : 4.0;
            const gravStr = 0.45;
            const jumpStr = -9.0;
            const jumpCutoff = 0.5;
            
            let p = s.player;
            let platVx = 0, platVy = 0;
            p.onGround = false;

            // Platform Pre-Check
            s.platforms.forEach(plat => {
                if (p.gravityDir === 'DOWN' && p.vy >= 0) {
                    if (p.y + p.radius <= plat.y + 5 && p.y + p.radius + p.vy >= plat.y && p.x + p.radius > plat.x && p.x - p.radius < plat.x + plat.w) {
                        p.y = plat.y - p.radius; p.vy = 0; p.onGround = true; platVx = plat.vx;
                    }
                }
            });

            // Input Logic
            const kUp = s.keys['KeyW'] || s.keys['ArrowUp'] || s.keys['Space'];
            const kDown = s.keys['KeyS'] || s.keys['ArrowDown'];
            const kLeft = s.keys['KeyA'] || s.keys['ArrowLeft'];
            const kRight = s.keys['KeyD'] || s.keys['ArrowRight'];

            if (p.mode === 'red') {
                p.vx = 0; p.vy = 0;
                if (kUp) p.vy = -speed;
                if (kDown) p.vy = speed;
                if (kLeft) p.vx = -speed;
                if (kRight) p.vx = speed;
            } else {
                // Perfect Blue Soul Physics Order: Gravity -> Move -> Constrain -> Jump
                if (p.gravityDir === 'DOWN') {
                    p.vx = (kLeft ? -speed : 0) + (kRight ? speed : 0);
                    if (!p.onGround) {
                        p.vy += gravStr; // Apply Gravity
                        if (p.vy < 0 && !kUp) p.vy *= jumpCutoff; // Variable jump height
                    }
                } else if (p.gravityDir === 'UP') {
                    p.vx = (kLeft ? -speed : 0) + (kRight ? speed : 0);
                    p.vy -= gravStr;
                    if (p.vy > 0 && !kDown) p.vy *= jumpCutoff;
                } else if (p.gravityDir === 'LEFT') {
                    p.vy = (kUp ? -speed : 0) + (kDown ? speed : 0);
                    p.vx -= gravStr;
                    if (p.vx > 0 && !kRight) p.vx *= jumpCutoff;
                } else if (p.gravityDir === 'RIGHT') {
                    p.vy = (kUp ? -speed : 0) + (kDown ? speed : 0);
                    p.vx += gravStr;
                    if (p.vx < 0 && !kLeft) p.vx *= jumpCutoff;
                }
            }

            // Apply Velocity
            p.x += p.vx + platVx;
            p.y += p.vy + platVy;

            // Resolve Box Constraints AND apply jumping
            const r = p.radius;
            if (p.x < s.box.x + r) { p.x = s.box.x + r; p.vx = 0; if (p.gravityDir === 'LEFT') { p.onGround = true; if(kRight) p.vx = -jumpStr; } }
            if (p.x > s.box.x + s.box.w - r) { p.x = s.box.x + s.box.w - r; p.vx = 0; if (p.gravityDir === 'RIGHT') { p.onGround = true; if(kLeft) p.vx = jumpStr; } }
            if (p.y < s.box.y + r) { p.y = s.box.y + r; p.vy = 0; if (p.gravityDir === 'UP') { p.onGround = true; if(kDown) p.vy = -jumpStr; } }
            
            // Crucial fix for Bottom Box boundary
            if (p.y > s.box.y + s.box.h - r) { 
                p.y = s.box.y + s.box.h - r; 
                p.vy = 0; 
                if (p.gravityDir === 'DOWN') {
                    p.onGround = true; 
                    if(kUp) p.vy = jumpStr; // Jump ONLY after resolving to ground
                }
            }

            // Update Entities
            for (let i = s.platforms.length - 1; i >= 0; i--) {
                s.platforms[i].x += s.platforms[i].vx;
                if (s.platforms[i].x < 0 || s.platforms[i].x > 640) s.platforms.splice(i, 1);
            }

            for (let i = s.projectiles.length - 1; i >= 0; i--) {
                const pr = s.projectiles[i];
                if (pr.type === 'bone') {
                    pr.x += pr.vx; pr.y += pr.vy;
                    if (p.x > pr.x - r && p.x < pr.x + pr.w + r && p.y > pr.y - r && p.y < pr.y + pr.h + r) takeDamage(pr.isBlue);
                    if (pr.x < -100 || pr.x > 740) s.projectiles.splice(i, 1);
                } else if (pr.type === 'blaster') {
                    if (pr.scale < 1) pr.scale += 0.2;
                    pr.timer--;
                    if (pr.timer === 0) { pr.fired = true; s.shake = 12; pr.alpha = 1; Audio.play('blaster'); }
                    if (pr.fired) {
                        pr.alpha -= 0.05;
                        const dx = p.x - pr.x; const dy = p.y - pr.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist > 15 && Math.abs(pr.angle - Math.atan2(dy, dx)) < 0.15 && pr.alpha > 0.5) takeDamage(false);
                        if (pr.alpha <= 0) s.projectiles.splice(i, 1);
                    }
                } else if (pr.type === 'warning') {
                    pr.timer--;
                    if (pr.timer <= 0) s.projectiles.splice(i, 1);
                }
            }

            if (s.shake > 0) s.shake -= 0.8;
            
            if (s.frame >= s.turnDuration && s.projectiles.length === 0) {
                STATE = 'MENU';
                turn++; stamina += 10;
                flavorText.style.display = 'block';
                flavorText.innerText = "* Sans is recovering his breath.";
                s.player.mode = 'red';
                updateMenuUI();
            }
        }
    }

    // --- GAME OVER LOGIC ---
    function triggerGameOver() {
        STATE = 'GAMEOVER';
        deaths++;
        localStorage.setItem('ut_deaths', deaths);
        
        s.deathState = 0;
        s.deathTimer = 0;
        s.deathFragments = [];
        
        // Hide all UI
        document.querySelector('.hud').style.display = 'none';
        document.querySelector('.btn-row').style.display = 'none';
        flavorText.style.display = 'none';
        dialogueBox.style.display = 'none';
    }

    function updateGameOver() {
        s.deathTimer++;
        if (s.deathState === 0 && s.deathTimer > 60) {
            // Heart Breaks in half
            s.deathState = 1;
            Audio.play('break');
            s.deathTimer = 0;
        } else if (s.deathState === 1 && s.deathTimer > 60) {
            // Heart Shatters
            s.deathState = 2;
            Audio.play('shatter');
            for(let i=0; i<6; i++) {
                s.deathFragments.push({ x: s.player.x, y: s.player.y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*15 - 5 });
            }
            s.deathTimer = 0;
        } else if (s.deathState === 2) {
            // Pieces fly
            s.deathFragments.forEach(f => { f.x += f.vx; f.y += f.vy; f.vy += 0.3; });
            
            // Fade in text
            if (s.deathTimer === 100) {
                document.getElementById('game-over').style.display = 'flex';
                setTimeout(() => document.getElementById('go-title').style.opacity = '1', 100);
                setTimeout(() => document.getElementById('go-text').style.opacity = '1', 2000);
            }
        }
    }

    // --- ATTACK MACROS ---
    function processAttacks(frame) {
        if (!s.attacks) return;
        s.attacks.forEach(atk => {
            if (atk.type === 'STRONG_START') {
                if (frame === atk.frame) slamGravity('DOWN');
                if (frame === atk.frame + 30) spawnBone(s.box.x + s.box.w, s.box.y + s.box.h - 80, 20, 80, -8, 0); 
                if (frame > atk.frame + 50 && frame < atk.frame + 150 && frame % 15 === 0) spawnBone(s.box.x + s.box.w, s.box.y + s.box.h - 40, 15, 40, -10, 0); 
                if (frame === atk.frame + 180) {
                    spawnBlaster(s.player.x - 100, s.box.y - 150, Math.PI/2, 40);
                    spawnBlaster(s.player.x + 100, s.box.y - 150, Math.PI/2, 50);
                    spawnBlaster(s.player.x, s.box.y - 150, Math.PI/2, 60);
                }
            }
            if (atk.type === 'SLAM' && frame === atk.frame) slamGravity(atk.dir || 'DOWN');
            if (atk.type === 'GAPS' && frame >= atk.frame && frame <= atk.frame + (atk.count || 4) * 50) {
                if (frame % 50 === 0) {
                    const gapY = s.box.y + 45 + Math.random() * (s.box.h - 110);
                    spawnBone(s.box.x + s.box.w, s.box.y, 20, gapY - s.box.y, -(atk.speed || 6), 0); 
                    spawnBone(s.box.x + s.box.w, gapY + 45, 20, (s.box.y + s.box.h) - (gapY + 45), -(atk.speed || 6), 0); 
                }
            }
            if (atk.type === 'PLATFORMS' && frame >= atk.frame && frame <= atk.frame + (atk.duration || 150)) {
                if (frame === atk.frame) { for(let i=0; i<10; i++) spawnBone(s.box.x + i*40, s.box.y + s.box.h - 30, 40, 30, 0, 0); }
                if (frame % 60 === 0) s.platforms.push({ x: s.box.x + s.box.w, y: s.box.y + s.box.h - 60 + (Math.random()*20-10), w: 45, h: 5, vx: -(atk.speed || 4) });
            }
            if (atk.type === 'BLASTER_AIM' && frame >= atk.frame && frame <= atk.frame + (atk.count || 3) * 40) {
                if (frame % 40 === 0) {
                    const angle = Math.atan2((s.box.y+s.box.h/2) - (s.player.y - 150), (s.box.x+s.box.w/2) - s.player.x);
                    spawnBlaster(s.player.x + Math.cos(angle+Math.PI)*150, s.player.y + Math.sin(angle+Math.PI)*150, angle, 40);
                }
            }
        });
    }

    function spawnBone(x, y, w, h, vx, vy, isBlue = false) { s.projectiles.push({ type: 'bone', x, y, w, h, vx, vy, isBlue }); }
    function spawnBlaster(x, y, angle, delay) { s.projectiles.push({ type: 'blaster', x, y, angle, timer: delay, fired: false, alpha: 0, scale: 0 }); }

    // --- RENDERER ---
    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 640, 480);
        
        if (STATE === 'GAMEOVER') {
            if (s.deathState === 0) {
                drawHeart(s.player.x, s.player.y, 'red'); // Still
            } else if (s.deathState === 1) {
                ctx.fillStyle = 'red'; // Broken halfs
                ctx.fillRect(s.player.x - 10, s.player.y - 8, 9, 16);
                ctx.fillRect(s.player.x + 1, s.player.y - 8, 9, 16);
            } else if (s.deathState === 2) {
                ctx.fillStyle = 'red'; // Fragments
                s.deathFragments.forEach(f => ctx.fillRect(f.x, f.y, 4, 4));
            }
            return;
        }

        ctx.save();
        if (s.shake > 0) ctx.translate((Math.random()-0.5)*s.shake, (Math.random()-0.5)*s.shake);

        // Sans Sprite
        const sx = 320 + s.sansOffset; const sy = 120 + Math.sin(Date.now()*0.005)*5;
        ctx.fillStyle = '#2255ff'; ctx.beginPath(); ctx.roundRect(sx - 35, sy, 70, 50, 10); ctx.fill(); 
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(sx, sy - 20, 30, 25, 0, 0, Math.PI*2); ctx.fill(); 
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(sx - 12, sy - 22, 6, 0, Math.PI*2); ctx.arc(sx + 12, sy - 22, 6, 0, Math.PI*2); ctx.fill(); 
        if (STATE === 'BATTLE' && s.frame % 10 < 5 && s.player.mode === 'blue') {
            ctx.fillStyle = '#00ffff'; ctx.beginPath(); ctx.arc(sx - 12, sy - 22, 4, 0, Math.PI*2); ctx.fill(); 
        }
        ctx.beginPath(); ctx.moveTo(sx - 15, sy - 5); ctx.quadraticCurveTo(sx, sy + 5, sx + 15, sy - 5); ctx.lineWidth=3; ctx.stroke(); 
        ctx.fillStyle = '#000'; ctx.fillRect(sx - 25, sy + 50, 50, 20); 
        ctx.fillStyle = '#fff'; ctx.fillRect(sx - 20, sy + 50, 5, 20); ctx.fillRect(sx + 15, sy + 50, 5, 20); 

        if (s.sansOffset < 0) {
            ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Courier Prime'; ctx.fillText("MISS", sx - 25, sy - 60);
        }

        // Box
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.strokeRect(s.box.x, s.box.y, s.box.w, s.box.h);

        // Fight Bar
        if (STATE === 'ATTACKING') {
            ctx.fillStyle = '#333'; ctx.fillRect(s.box.x + 10, s.box.y + 10, s.box.w - 20, s.box.h - 20);
            ctx.fillStyle = '#fff'; ctx.fillRect(s.box.x + s.fightBar.x, s.box.y + 5, 12, s.box.h - 10);
        }

        // Platforms & Projectiles
        s.platforms.forEach(plat => { ctx.fillStyle = '#00ff00'; ctx.fillRect(plat.x, plat.y, plat.w, plat.h); });
        
        s.projectiles.forEach(p => {
            if (p.type === 'bone') {
                ctx.fillStyle = p.isBlue ? '#00ccff' : '#fff'; ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = '#000'; ctx.fillRect(p.x+2, p.y+2, p.w-4, p.h-4);
                ctx.fillStyle = p.isBlue ? '#00ccff' : '#fff'; ctx.fillRect(p.x+4, p.y+4, p.w-8, p.h-8);
            } else if (p.type === 'blaster') {
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle); ctx.scale(p.scale, p.scale);
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(-20, -10); ctx.lineTo(20, -10); ctx.lineTo(15, 20); ctx.lineTo(-15, 20); ctx.fill();
                ctx.fillStyle = '#000'; ctx.fillRect(-10, 0, 5, 5); ctx.fillRect(5, 0, 5, 5);
                if (p.fired) {
                    ctx.fillStyle = `rgba(255,255,255,${p.alpha})`; ctx.fillRect(20, -30, 1000, 60);
                    ctx.fillStyle = '#00ffff'; ctx.fillRect(20, -15, 1000, 30);
                } else {
                    ctx.strokeStyle = `rgba(255,255,255,${0.2 + Math.sin(Date.now()*0.02)*0.2})`;
                    ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(1000, 0); ctx.stroke();
                }
                ctx.restore();
            }
        });

        // Soul
        if (STATE === 'BATTLE') drawHeart(s.player.x, s.player.y, s.player.mode === 'red' ? 'red' : '#00a2ff');
        else if (STATE === 'MENU' || STATE === 'LOADING') drawHeart(80 + menuIdx * 140, 430, 'red');

        ctx.restore();
    }

    function drawHeart(x, y, color) {
        ctx.fillStyle = color; ctx.beginPath();
        ctx.moveTo(x, y + 4); ctx.bezierCurveTo(x, y - 4, x - 10, y - 4, x - 10, y + 4);
        ctx.bezierCurveTo(x - 10, y + 12, x, y + 18, x, y + 18);
        ctx.bezierCurveTo(x, y + 18, x + 10, y + 12, x + 10, y + 4);
        ctx.bezierCurveTo(x + 10, y - 4, x, y - 4, x, y + 4); ctx.fill();
    }

    // --- GAME FLOW ---
    function updateMenuUI() {
        for(let i=0; i<4; i++) {
            document.getElementById(`btn-${i}`).className = `action-btn ${menuIdx === i ? 'active' : ''}`;
        }
    }

    function updateHUD() {
        hpFill.style.width = `${(hp/MAX_HP)*100}%`;
        krFill.style.width = `${(kr/MAX_HP)*100}%`;
        hpText.innerText = `${hp} / ${MAX_HP}`;
        krLabel.style.display = kr > 0 ? 'inline' : 'none';
    }

    async function executeTurnPrep() {
        Audio.init();
        STATE = 'LOADING';
        flavorText.style.display = 'none';
        loadingAi.style.display = 'block';
        
        const payload = await fetchAiTurn();
        
        s.dialogueLines = payload.dialogue || ["..."];
        s.lineIdx = 0; s.charIdx = 0; s.typing = true;
        s.turnDuration = payload.duration || 400;
        s.attacks = payload.attacks || [];
        
        loadingAi.style.display = 'none';
        dialogueBox.style.display = 'block';
        dArrow.style.display = 'none';
        dText.innerText = "";
        STATE = 'DIALOGUE';
    }

    function advanceDialogue() {
        if (s.typing) {
            // Skip typing
            s.charIdx = s.dialogueLines[s.lineIdx].length;
            dText.innerText = s.dialogueLines[s.lineIdx];
            s.typing = false;
            dArrow.style.display = 'inline-block';
        } else {
            // Next line or Battle
            s.lineIdx++;
            if (s.lineIdx < s.dialogueLines.length) {
                s.charIdx = 0; s.typing = true;
                dText.innerText = ""; dArrow.style.display = 'none';
            } else {
                dialogueBox.style.display = 'none';
                STATE = 'BATTLE';
                s.frame = 0; s.projectiles = []; s.platforms = [];
                s.player.x = 320; s.player.y = 320; s.player.mode = 'red';
            }
        }
    }

    // --- INPUT & LOOP ---
    window.addEventListener('keydown', e => {
        Audio.init();
        s.keys[e.code] = true;
        if (STATE === 'MENU') {
            if (e.code === 'ArrowRight' || e.code === 'KeyD') { Audio.play('select'); menuIdx = (menuIdx + 1) % 4; updateMenuUI(); }
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') { Audio.play('select'); menuIdx = (menuIdx + 3) % 4; updateMenuUI(); }
            if (e.code === 'KeyZ' || e.code === 'Enter') {
                Audio.play('select');
                if (menuIdx === 0) { STATE = 'ATTACKING'; s.fightBar = { x: 0, dir: 1 }; flavorText.style.display = 'none'; }
                else if (menuIdx === 2) { hp = MAX_HP; kr = 0; flavorText.innerText = "* You ate the Legendary Hero. HP maxed."; executeTurnPrep(); }
                else executeTurnPrep();
            }
        } else if (STATE === 'ATTACKING' && (e.code === 'KeyZ' || e.code === 'Enter')) {
            Audio.play('dodge');
            s.sansOffset = -60; setTimeout(() => { s.sansOffset = 0; executeTurnPrep(); }, 800);
            STATE = 'LOADING';
        } else if (STATE === 'DIALOGUE' && (e.code === 'KeyZ' || e.code === 'Enter')) {
            advanceDialogue();
        }
    });
    window.addEventListener('keyup', e => s.keys[e.code] = false);

    setInterval(() => { if (kr > 0 && hp > 1) { hp--; kr--; updateHUD(); } }, 1000);

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
</script>

</body>
</html>
