<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Rooms - 3D Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        
        /* UI Overlays */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 4px #000; transition: transform 0.1s; }
        #interact-prompt { position: absolute; top: 60%; left: 50%; transform: translateX(-50%); font-size: 20px; font-weight: bold; text-shadow: 2px 2px 4px #000; display: none; }
        #room-counter { position: absolute; top: 20px; left: 20px; font-size: 42px; font-weight: bold; text-shadow: 3px 3px 6px #000; font-family: 'Courier New', Courier, monospace; letter-spacing: 2px; }
        
        /* Stats UI */
        #stats-container { position: absolute; bottom: 30px; left: 30px; width: 250px; z-index: 10; display: none; pointer-events: none; }
        .stat-label { color: white; font-weight: bold; margin-bottom: 6px; text-shadow: 1px 1px 3px #000; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;}
        .stat-bar-bg { background: rgba(0,0,0,0.7); border: 2px solid #333; height: 14px; border-radius: 8px; overflow: hidden; margin-bottom: 15px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #stamina-fill { background: linear-gradient(90deg, #22c55e, #4ade80); height: 100%; width: 100%; transition: width 0.1s linear; }
        #battery-fill { background: linear-gradient(90deg, #eab308, #facc15); height: 100%; width: 100%; transition: width 0.1s linear; }

        /* Effects UI */
        #hide-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(90deg, #020202, #020202 80px, transparent 80px, transparent 120px); z-index: 5; display: none; pointer-events: none; opacity: 0.95; box-shadow: inset 0 0 100px rgba(0,0,0,1); }
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 40%, rgba(150,0,0,0.8) 100%); z-index: 4; display: none; pointer-events: none; }

        /* Menus */
        .menu-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a2e 0%, #050505 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; pointer-events: auto; }
        .panel { background: rgba(10, 10, 15, 0.9); border: 1px solid #333; border-radius: 12px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.8); width: 100%; max-width: 600px; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #666; }

        /* Loader */
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #fff; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- WebGL Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- In-Game UI -->
    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="interact-prompt">Click to Open</div>
        <div id="room-counter">0000</div>
    </div>

    <!-- Stats & Effects -->
    <div id="stats-container">
        <div>
            <div class="stat-label">Stamina (Shift)</div>
            <div class="stat-bar-bg"><div id="stamina-fill"></div></div>
        </div>
        <div>
            <div class="stat-label">Flashlight (F)</div>
            <div class="stat-bar-bg"><div id="battery-fill"></div></div>
        </div>
    </div>
    <div id="hide-overlay"></div>
    <div id="damage-overlay"></div>

    <!-- Death Screen -->
    <div id="death-screen" class="menu-screen hidden" style="background: rgba(50, 0, 0, 0.95); z-index: 30;">
        <h1 class="text-8xl font-black text-black mb-2 tracking-tighter" style="text-shadow: 0 0 30px red, 0 0 10px darkred;">YOU DIED</h1>
        <p class="text-3xl text-gray-300 mb-10 font-light italic">You couldn't hide in time...</p>
        <button id="btn-respawn" class="bg-red-900 hover:bg-red-700 text-white px-8 py-4 rounded transition font-bold text-2xl shadow-[0_0_15px_rgba(255,0,0,0.5)]">
            Back to Lobby
        </button>
    </div>

    <!-- Auth / Loading Screen -->
    <div id="auth-screen" class="menu-screen">
        <h1 class="text-6xl font-black mb-8 tracking-widest text-gray-200" style="text-shadow: 0 0 20px rgba(255,255,255,0.2);">THE ROOMS</h1>
        <div class="spinner mb-4"></div>
        <p class="text-gray-400 animate-pulse">Connecting to servers...</p>
    </div>

    <!-- Server Browser Screen -->
    <div id="browser-screen" class="menu-screen hidden">
        <div class="panel">
            <h2 class="text-3xl font-bold mb-6 text-white border-b border-gray-700 pb-2">Lobby Browser</h2>
            <div class="flex justify-between items-center mb-4">
                <span id="player-name-display" class="text-gray-400">Logged in as: ...</span>
                <button id="btn-create-lobby" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded transition font-semibold shadow-lg hover:shadow-blue-500/50">
                    Create Lobby
                </button>
            </div>
            
            <div id="lobby-list" class="bg-black/50 border border-gray-800 rounded h-64 overflow-y-auto p-2 space-y-2">
                <!-- Lobbies injected here -->
                <div class="text-center text-gray-500 mt-10">Searching for lobbies...</div>
            </div>
        </div>
    </div>

    <!-- Active Lobby Screen -->
    <div id="lobby-screen" class="menu-screen hidden">
        <div class="panel">
            <h2 id="lobby-title" class="text-3xl font-bold mb-2 text-white">Lobby</h2>
            <p id="lobby-status" class="text-gray-400 mb-6 border-b border-gray-700 pb-2">Waiting for host...</p>
            
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <h3 class="text-xl font-semibold mb-3 text-gray-300">Players</h3>
                    <ul id="lobby-players" class="bg-black/50 border border-gray-800 rounded h-48 overflow-y-auto p-3 space-y-2">
                        <!-- Players injected here -->
                    </ul>
                </div>
                <div class="flex flex-col justify-end space-y-3">
                    <button id="btn-start-game" class="bg-green-600 hover:bg-green-500 text-white px-4 py-3 rounded transition font-bold text-lg shadow-lg hover:shadow-green-500/50 hidden">
                        START RUN
                    </button>
                    <button id="btn-leave-lobby" class="bg-red-900 hover:bg-red-700 text-white px-4 py-2 rounded transition font-semibold">
                        Leave Lobby
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase & Three.js Application Logic -->
    <script type="module">
        // --- 1. Imports ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 2. Firebase Initialization (Rule Strict) ---
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'doors-clone-app';

        // --- 3. App State & Globals ---
        let user = null;
        let userName = `Player_${Math.floor(Math.random() * 10000)}`;
        let currentLobbyId = null;
        let isHost = false;
        let appState = 'auth'; // auth, browser, lobby, playing
        
        let lobbiesUnsubscribe = null;
        let currentLobbyUnsubscribe = null;
        let positionsUnsubscribe = null;

        // Game Mechanics State
        let stamina = 100;
        let battery = 100;
        let isSprinting = false;
        let flashlightOn = true;
        let isHidden = false;
        let isDead = false;
        let hiddenCloset = null;
        let activeMonster = null;
        let flickerTimer = 0;
        let headBobTimer = 0;
        let lastMonsterTime = 0;

        // UI Elements
        const screens = {
            auth: document.getElementById('auth-screen'),
            browser: document.getElementById('browser-screen'),
            lobby: document.getElementById('lobby-screen'),
            ui: document.getElementById('ui-layer'),
            canvas: document.getElementById('game-canvas')
        };

        function switchScreen(screenName) {
            Object.values(screens).forEach(s => s.style.display = 'none');
            document.getElementById('stats-container').style.display = 'none';
            
            if (screenName === 'playing') {
                screens.canvas.style.display = 'block';
                screens.ui.style.display = 'block';
                document.getElementById('stats-container').style.display = 'block';
            } else {
                screens[screenName].style.display = 'flex';
                screens.canvas.style.display = 'none';
            }
            appState = screenName;
        }

        // --- Audio System ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            if (type === 'jumpscare') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.5);
                gain.gain.setValueAtTime(1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
                osc.start(now); osc.stop(now + 1.5);
            } else if (type === 'rumble') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(40, now);
                for(let i=0; i<10; i++) {
                    osc.frequency.linearRampToValueAtTime(30 + Math.random()*20, now + i*0.3);
                }
                gain.gain.setValueAtTime(0.6, now);
                gain.gain.linearRampToValueAtTime(0, now + 3);
                osc.start(now); osc.stop(now + 3);
            } else if (type === 'open') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.4);
                gain.gain.setValueAtTime(0.5, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'hide') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            }
        }

        // --- 4. Authentication (Rule 3) ---
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error);
                setTimeout(initAuth, 2000);
            }
        }

        onAuthStateChanged(auth, (currentUser) => {
            if (currentUser) {
                user = currentUser;
                document.getElementById('player-name-display').innerText = `Logged in as: ${userName}`;
                initLobbyBrowser();
            }
        });

        initAuth();

        // --- 5. Multiplayer Lobby Logic (Rule 1 & 2) ---
        const lobbiesCol = collection(db, 'artifacts', appId, 'public', 'data', 'lobbies');
        const positionsCol = collection(db, 'artifacts', appId, 'public', 'data', 'positions');

        function initLobbyBrowser() {
            switchScreen('browser');
            if (lobbiesUnsubscribe) lobbiesUnsubscribe();
            
            lobbiesUnsubscribe = onSnapshot(lobbiesCol, (snapshot) => {
                if (appState !== 'browser') return;
                const list = document.getElementById('lobby-list');
                list.innerHTML = '';
                
                if (snapshot.empty) {
                    list.innerHTML = '<div class="text-center text-gray-500 mt-10">No active lobbies. Create one!</div>';
                    return;
                }

                snapshot.docs.forEach(docSnap => {
                    const data = docSnap.data();
                    if (data.status === 'playing' && (!data.players.some(p => p.uid === user.uid))) return; 

                    const el = document.createElement('div');
                    el.className = 'flex justify-between items-center bg-gray-800 p-3 rounded shadow hover:bg-gray-700 transition';
                    el.innerHTML = `
                        <div>
                            <span class="font-bold text-blue-300">${data.name}</span>
                            <span class="text-xs text-gray-400 ml-2">${data.players.length} players</span>
                        </div>
                        <button class="bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded text-sm font-bold btn-join" data-id="${docSnap.id}">Join</button>
                    `;
                    list.appendChild(el);
                });

                document.querySelectorAll('.btn-join').forEach(btn => {
                    btn.onclick = () => joinLobby(btn.getAttribute('data-id'));
                });
            }, (error) => console.error("Lobby fetch error:", error));
        }

        document.getElementById('btn-create-lobby').onclick = async () => {
            if (!user) return;
            const newLobbyRef = doc(lobbiesCol); 
            await setDoc(newLobbyRef, {
                name: `${userName}'s Run`,
                host: user.uid,
                status: 'waiting',
                players: [{ uid: user.uid, name: userName }],
                createdAt: Date.now()
            });
            joinLobby(newLobbyRef.id);
        };

        async function joinLobby(lobbyId) {
            currentLobbyId = lobbyId;
            switchScreen('lobby');
            
            const lobbyRef = doc(lobbiesCol, lobbyId);
            await updateDoc(lobbyRef, {
                players: arrayUnion({ uid: user.uid, name: userName })
            });

            if (currentLobbyUnsubscribe) currentLobbyUnsubscribe();
            
            currentLobbyUnsubscribe = onSnapshot(lobbyRef, (docSnap) => {
                if (!docSnap.exists()) {
                    initLobbyBrowser();
                    return;
                }
                const data = docSnap.data();
                isHost = (data.host === user.uid);
                
                document.getElementById('lobby-title').innerText = data.name;
                document.getElementById('lobby-status').innerText = data.status === 'waiting' ? 'Waiting for host to start...' : 'Game is starting...';
                
                const playersList = document.getElementById('lobby-players');
                playersList.innerHTML = '';
                data.players.forEach(p => {
                    const li = document.createElement('li');
                    li.className = 'p-2 bg-gray-800 rounded flex justify-between items-center';
                    li.innerHTML = `<span>${p.name} ${p.uid === data.host ? '<span class="text-xs bg-yellow-600 px-1 rounded ml-2">HOST</span>' : ''}</span>`;
                    playersList.appendChild(li);
                });

                const startBtn = document.getElementById('btn-start-game');
                startBtn.style.display = (isHost && data.status === 'waiting') ? 'block' : 'none';

                // Sync Monster Events
                if (data.monsterEvent && data.monsterEvent.timestamp > lastMonsterTime) {
                    if (Date.now() - data.monsterEvent.timestamp < 10000 && appState === 'playing') {
                        triggerMonster(data.monsterEvent.roomIndex);
                    }
                    lastMonsterTime = data.monsterEvent.timestamp;
                }

                // Transition to game
                if (data.status === 'playing' && appState === 'lobby') {
                    startGameEngine();
                }
            }, (error) => console.error("Lobby sync error:", error));
        }

        document.getElementById('btn-leave-lobby').onclick = async () => {
            if (!user || !currentLobbyId) return;
            const lobbyRef = doc(lobbiesCol, currentLobbyId);
            await updateDoc(lobbyRef, {
                players: arrayRemove({ uid: user.uid, name: userName })
            });
            if (isHost) await deleteDoc(lobbyRef);
            
            if (currentLobbyUnsubscribe) currentLobbyUnsubscribe();
            currentLobbyId = null;
            isHost = false;
            initLobbyBrowser();
        };

        document.getElementById('btn-start-game').onclick = async () => {
            if (!user || !isHost || !currentLobbyId) return;
            const lobbyRef = doc(lobbiesCol, currentLobbyId);
            await updateDoc(lobbyRef, { status: 'playing' });
        };


        // --- 6. 3D Engine Setup (Three.js) ---
        let scene, camera, renderer, controls;
        let ambientLight, flashLight;
        let lastTime = performance.now();
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        
        // Game State
        const roomWidth = 16;
        const roomHeight = 12;
        const roomDepth = 24;
        let generatedRooms = [];
        let doors = [];
        let closets = [];
        let otherPlayers = {};
        let posSyncInterval = null;
        let animationFrameId = null;
        let raycaster, mouse;

        // Materials (Procedural Textures)
        let floorMat, wallMat, ceilingMat, doorMat;

        function createTextures() {
            // Checkered Floor
            const canvasFloor = document.createElement('canvas');
            canvasFloor.width = 256; canvasFloor.height = 256;
            const ctxF = canvasFloor.getContext('2d');
            ctxF.fillStyle = '#1c1511'; ctxF.fillRect(0,0,256,256);
            ctxF.fillStyle = '#120d09';
            ctxF.fillRect(0,0,128,128); ctxF.fillRect(128,128,128,128);
            const texFloor = new THREE.CanvasTexture(canvasFloor);
            texFloor.wrapS = texFloor.wrapT = THREE.RepeatWrapping;
            texFloor.repeat.set(roomWidth/4, roomDepth/4);
            floorMat = new THREE.MeshStandardMaterial({ map: texFloor, roughness: 0.9 });

            // Wallpaper
            const canvasWall = document.createElement('canvas');
            canvasWall.width = 128; canvasWall.height = 128;
            const ctxW = canvasWall.getContext('2d');
            ctxW.fillStyle = '#151720'; ctxW.fillRect(0,0,128,128);
            ctxW.fillStyle = '#0a0b12';
            for(let i=0; i<128; i+=8) ctxW.fillRect(0, i, 128, 2);
            const texWall = new THREE.CanvasTexture(canvasWall);
            texWall.wrapS = texWall.wrapT = THREE.RepeatWrapping;
            texWall.repeat.set(roomDepth/4, roomHeight/4);
            wallMat = new THREE.MeshStandardMaterial({ map: texWall, roughness: 0.9 });

            // Ceiling (Dark tiles)
            ceilingMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.9 });
            doorMat = new THREE.MeshStandardMaterial({ color: 0x2e180d, roughness: 0.7 });
        }

        function startGameEngine() {
            switchScreen('playing');
            
            // Reset Mechanics State
            stamina = 100; battery = 100; isSprinting = false; flashlightOn = true;
            isHidden = false; isDead = false; hiddenCloset = null; activeMonster = null; flickerTimer = 0;
            
            document.getElementById('stamina-fill').style.width = '100%';
            document.getElementById('battery-fill').style.width = '100%';
            document.getElementById('hide-overlay').style.display = 'none';
            document.getElementById('damage-overlay').style.display = 'none';

            if (renderer) {
                renderer.dispose();
                document.getElementById('game-canvas').replaceWith(renderer.domElement);
            }

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.FogExp2(0x020202, 0.08);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 5, 5);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            ambientLight = new THREE.AmbientLight(0x222233, 0.3); 
            scene.add(ambientLight);

            flashLight = new THREE.SpotLight(0xfffae6, 1.2, 45, Math.PI/5, 0.6, 1);
            flashLight.position.set(0, 0, 0);
            flashLight.target.position.set(0, 0, -1);
            camera.add(flashLight);
            camera.add(flashLight.target);
            scene.add(camera);

            controls = new PointerLockControls(camera, document.body);
            
            document.body.addEventListener('click', () => {
                if (appState === 'playing' && !isDead && !isHidden && !controls.isLocked) {
                    controls.lock();
                    if(audioCtx.state === 'suspended') audioCtx.resume();
                }
            });

            // Input handling
            const onKeyDown = function (event) {
                if(isDead || isHidden) return;
                switch (event.code) {
                    case 'ArrowUp': case 'KeyW': moveForward = true; break;
                    case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                    case 'ArrowRight': case 'KeyD': moveRight = true; break;
                    case 'ShiftLeft': isSprinting = true; break;
                    case 'KeyF': 
                        if(battery > 0) {
                            flashlightOn = !flashlightOn;
                            flashLight.visible = flashlightOn;
                        }
                        break;
                }
            };
            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'ArrowUp': case 'KeyW': moveForward = false; break;
                    case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                    case 'ArrowRight': case 'KeyD': moveRight = false; break;
                    case 'ShiftLeft': isSprinting = false; break;
                }
            };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2(0, 0);

            createTextures();

            generatedRooms.forEach(r => scene.remove(r.group));
            generatedRooms = [];
            doors = [];
            closets = [];
            
            buildRoom(0);
            buildRoom(1);

            startMultiplayerSync();
            window.addEventListener('resize', onWindowResize, false);

            lastTime = performance.now();
            animate();
        }

        function onWindowResize() {
            if(!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 7. Procedural Room Generation ---
        function updateAtmosphere(roomIdx) {
            if(!scene || !ambientLight) return;
            const tier = Math.floor(roomIdx / 10); // Gets darker every 10 rooms
            ambientLight.intensity = Math.max(0.02, 0.3 - tier * 0.05);
            scene.fog.density = Math.min(0.2, 0.08 + tier * 0.015);
        }

        function buildRoom(index) {
            const group = new THREE.Group();
            const zOffset = -(index * roomDepth);

            // Room Shell
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomDepth), floorMat);
            floor.rotation.x = -Math.PI / 2; floor.position.set(0, 0, zOffset - roomDepth/2);
            floor.receiveShadow = true; group.add(floor);

            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomDepth), ceilingMat);
            ceil.rotation.x = Math.PI / 2; ceil.position.set(0, roomHeight, zOffset - roomDepth/2); group.add(ceil);

            const wallGeo = new THREE.PlaneGeometry(roomDepth, roomHeight);
            const wallLeft = new THREE.Mesh(wallGeo, wallMat);
            wallLeft.rotation.y = Math.PI / 2; wallLeft.position.set(-roomWidth/2, roomHeight/2, zOffset - roomDepth/2);
            wallLeft.receiveShadow = true; group.add(wallLeft);

            const wallRight = new THREE.Mesh(wallGeo, wallMat);
            wallRight.rotation.y = -Math.PI / 2; wallRight.position.set(roomWidth/2, roomHeight/2, zOffset - roomDepth/2);
            wallRight.receiveShadow = true; group.add(wallRight);

            if (index === 0) {
                const wallBack = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomHeight), wallMat);
                wallBack.position.set(0, roomHeight/2, 0); group.add(wallBack);
            }

            // Generate Closets (50% chance in regular rooms)
            if (index > 0 && Math.random() > 0.5) {
                const closetGeo = new THREE.BoxGeometry(3, 7.5, 2.5);
                const closetMat = new THREE.MeshStandardMaterial({ color: 0x140d08, roughness: 0.9 });
                const closet = new THREE.Mesh(closetGeo, closetMat);
                const isLeft = Math.random() > 0.5;
                
                closet.position.set(isLeft ? -roomWidth/2 + 1.5 : roomWidth/2 - 1.5, 3.75, zOffset - roomDepth/2);
                closet.userData = {
                    isCloset: true,
                    hidePos: new THREE.Vector3(closet.position.x, 5, closet.position.z),
                    exitPos: new THREE.Vector3(closet.position.x + (isLeft ? 3 : -3), 5, closet.position.z)
                };
                group.add(closet);
                closets.push(closet);
            }

            // Door Generation
            const doorGroup = new THREE.Group();
            doorGroup.position.set(0, 0, zOffset - roomDepth); 
            
            const lw = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth/2 - 2.5, roomHeight), wallMat);
            lw.position.set(-(roomWidth/2 - 2.5)/2 - 2.5, roomHeight/2, 0);
            const rw = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth/2 - 2.5, roomHeight), wallMat);
            rw.position.set((roomWidth/2 - 2.5)/2 + 2.5, roomHeight/2, 0);
            const tw = new THREE.Mesh(new THREE.PlaneGeometry(5, roomHeight - 8), wallMat);
            tw.position.set(0, roomHeight - (roomHeight - 8)/2, 0);
            doorGroup.add(lw); doorGroup.add(rw); doorGroup.add(tw);

            const doorPivot = new THREE.Group();
            doorPivot.position.set(-2.5, 0, 0); 
            
            const doorMesh = new THREE.Mesh(new THREE.BoxGeometry(5, 8, 0.4), doorMat);
            doorMesh.position.set(2.5, 4, 0); 
            doorMesh.castShadow = true;
            
            const doorLight = new THREE.PointLight(0xffaa55, 0.6, 15);
            doorLight.position.set(0, 9, 1);
            doorLight.userData.baseIntensity = 0.6;
            doorGroup.add(doorLight);

            doorMesh.userData = { isDoor: true, roomIndex: index, isOpen: false, pivot: doorPivot };
            doorPivot.add(doorMesh); doorGroup.add(doorPivot); group.add(doorGroup);
            doors.push(doorMesh);
            
            // Room Number Plate
            const canvasPlate = document.createElement('canvas');
            canvasPlate.width = 128; canvasPlate.height = 64;
            const ctxP = canvasPlate.getContext('2d');
            ctxP.fillStyle = '#111'; ctxP.fillRect(0,0,128,64);
            ctxP.fillStyle = '#fff'; ctxP.font = 'bold 40px Arial'; ctxP.textAlign = 'center'; ctxP.textBaseline = 'middle';
            ctxP.fillText((index + 1).toString().padStart(4, '0'), 64, 32);
            const texPlate = new THREE.CanvasTexture(canvasPlate);
            const plateMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 1), new THREE.MeshBasicMaterial({map: texPlate}));
            plateMesh.position.set(0, 7, 0.21);
            doorGroup.add(plateMesh);

            scene.add(group);
            generatedRooms.push({ index, group });

            // Cleanup old rooms
            if (generatedRooms.length > 5) {
                const oldRoom = generatedRooms.shift();
                scene.remove(oldRoom.group);
                doors = doors.filter(d => d.userData.roomIndex !== oldRoom.index);
                closets = closets.filter(c => c.position.z > -(oldRoom.index+1)*roomDepth );
            }
        }


        // --- 8. Multiplayer Sync & Monsters ---
        function startMultiplayerSync() {
            if (posSyncInterval) clearInterval(posSyncInterval);
            if (positionsUnsubscribe) positionsUnsubscribe();

            posSyncInterval = setInterval(async () => {
                if (!user || !currentLobbyId || appState !== 'playing') return;
                try {
                    const posRef = doc(positionsCol, user.uid);
                    await setDoc(posRef, {
                        lobbyId: currentLobbyId,
                        x: camera.position.x,
                        y: camera.position.y,
                        z: camera.position.z,
                        isDead: isDead,
                        timestamp: Date.now()
                    });
                } catch(e) {}
            }, 250);

            positionsUnsubscribe = onSnapshot(positionsCol, (snapshot) => {
                if (appState !== 'playing') return;
                const now = Date.now();
                
                snapshot.docs.forEach(docSnap => {
                    if (docSnap.id === user.uid) return;
                    const data = docSnap.data();
                    if (data.lobbyId !== currentLobbyId) return;
                    
                    if (now - data.timestamp > 10000) {
                        if (otherPlayers[docSnap.id]) {
                            scene.remove(otherPlayers[docSnap.id].mesh);
                            delete otherPlayers[docSnap.id];
                        }
                        return;
                    }

                    if (!otherPlayers[docSnap.id]) {
                        const geo = new THREE.CylinderGeometry(1.2, 1.2, 5, 16);
                        const mat = new THREE.MeshStandardMaterial({ color: 0x4488ff, roughness: 0.5 });
                        const mesh = new THREE.Mesh(geo, mat);
                        mesh.castShadow = true;
                        
                        const pLight = new THREE.PointLight(0x4488ff, 0.4, 10);
                        pLight.position.y = 2; mesh.add(pLight);
                        
                        scene.add(mesh);
                        otherPlayers[docSnap.id] = { mesh, targetPos: new THREE.Vector3(data.x, 2.5, data.z) };
                    }
                    
                    otherPlayers[docSnap.id].mesh.visible = !data.isDead;
                    otherPlayers[docSnap.id].targetPos.set(data.x, 2.5, data.z);
                });
            });
        }

        function createMonsterMesh() {
            const group = new THREE.Group();
            const core = new THREE.Mesh(new THREE.SphereGeometry(1.5, 16, 16), new THREE.MeshBasicMaterial({ color: 0x000000 }));
            group.add(core);
            const shell = new THREE.Mesh(new THREE.IcosahedronGeometry(2.5, 1), new THREE.MeshBasicMaterial({ color: 0x550000, wireframe: true }));
            group.add(shell);
            const light = new THREE.PointLight(0xff0000, 3, 30);
            light.userData.isMonsterLight = true;
            group.add(light);
            return group;
        }

        function triggerMonster(targetRoom) {
            if (activeMonster) return;
            activeMonster = {
                z: -(targetRoom - 5) * roomDepth,
                targetZ: -(targetRoom + 2) * roomDepth,
                speed: 45,
                mesh: createMonsterMesh()
            };
            scene.add(activeMonster.mesh);
            flickerTimer = 3.0; // 3s warning
            playSound('rumble');
        }

        function die() {
            isDead = true;
            controls.unlock();
            document.getElementById('death-screen').style.display = 'flex';
            document.getElementById('damage-overlay').style.display = 'block';
            playSound('jumpscare');
        }

        document.getElementById('btn-respawn').onclick = () => {
            switchScreen('lobby');
        };

        // Interaction Handling
        document.addEventListener('mousedown', (e) => {
            if (appState !== 'playing' || !controls.isLocked || isDead) return;
            if (e.button !== 0) return;

            // Exit closet
            if (isHidden && hiddenCloset) {
                isHidden = false;
                camera.position.copy(hiddenCloset.userData.exitPos);
                document.getElementById('hide-overlay').style.display = 'none';
                playSound('hide');
                hiddenCloset = null;
                return; 
            }

            const interactables = [...doors, ...closets];
            interactables.forEach(obj => {
                if (obj.userData.isHovered) {
                    if (obj.userData.isDoor && !obj.userData.isOpen) {
                        obj.userData.isOpen = true;
                        playSound('open');
                        buildRoom(obj.userData.roomIndex + 1);
                        updateAtmosphere(obj.userData.roomIndex + 1);

                        // Trigger Monster Chance (15% after room 3)
                        if (obj.userData.roomIndex > 2 && Math.random() < 0.15 && currentLobbyId) {
                            const lobbyRef = doc(lobbiesCol, currentLobbyId);
                            updateDoc(lobbyRef, {
                                monsterEvent: { roomIndex: obj.userData.roomIndex, timestamp: Date.now() }
                            });
                        }
                    } else if (obj.userData.isCloset && !isHidden) {
                        isHidden = true;
                        hiddenCloset = obj;
                        camera.position.copy(obj.userData.hidePos);
                        document.getElementById('hide-overlay').style.display = 'block';
                        playSound('hide');
                    }
                }
            });
        });


        // --- 9. Main Game Loop ---
        function animate() {
            if (appState !== 'playing') return;
            animationFrameId = requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - lastTime) / 1000;
            lastTime = time;

            if (controls.isLocked && !isDead) {
                // Mechanics Updates
                const isMoving = (moveForward || moveBackward || moveLeft || moveRight);
                
                if (isSprinting && isMoving && !isHidden) {
                    stamina -= 25 * delta;
                    if (stamina <= 0) { stamina = 0; isSprinting = false; }
                } else {
                    stamina += 15 * delta;
                    if (stamina > 100) stamina = 100;
                }
                document.getElementById('stamina-fill').style.width = stamina + '%';

                if (flashlightOn && !isHidden) {
                    battery -= 1.5 * delta;
                    if (battery <= 0) { battery = 0; flashlightOn = false; flashLight.visible = false; }
                } else if (!flashlightOn && battery < 100) {
                    battery += 1 * delta;
                }
                document.getElementById('battery-fill').style.width = battery + '%';

                // Physics / Movement
                if (!isHidden) {
                    velocity.x -= velocity.x * 10.0 * delta;
                    velocity.z -= velocity.z * 10.0 * delta;

                    direction.z = Number(moveForward) - Number(moveBackward);
                    direction.x = Number(moveRight) - Number(moveLeft);
                    direction.normalize();

                    const speed = (isSprinting && stamina > 0) ? 65.0 : 35.0;
                    if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                    if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

                    controls.moveRight(-velocity.x * delta);
                    controls.moveForward(-velocity.z * delta);

                    // Head Bobbing
                    if (isMoving) {
                        headBobTimer += delta * (isSprinting ? 14 : 9);
                        camera.position.y = 5 + Math.sin(headBobTimer) * 0.25;
                    } else {
                        camera.position.y = THREE.MathUtils.lerp(camera.position.y, 5, 0.1);
                    }

                    // Collision Detection
                    const px = camera.position.x;
                    const pz = camera.position.z;

                    if (px < -roomWidth/2 + 1.5) camera.position.x = -roomWidth/2 + 1.5;
                    if (px > roomWidth/2 - 1.5) camera.position.x = roomWidth/2 - 1.5;

                    const currentRoomIdx = Math.floor(Math.abs(pz) / roomDepth);
                    const nextDoorZ = -(currentRoomIdx + 1) * roomDepth;

                    if (pz < nextDoorZ + 1.5) {
                        const door = doors.find(d => d.userData.roomIndex === currentRoomIdx);
                        if (door && !door.userData.isOpen && Math.abs(px) < 2.5) {
                            camera.position.z = nextDoorZ + 1.5;
                        } else if (door && !door.userData.isOpen && Math.abs(px) >= 2.5) {
                            camera.position.z = nextDoorZ + 1.5;
                        }
                    }
                    if (pz > -1.5 && currentRoomIdx === 0) camera.position.z = -1.5;

                    document.getElementById('room-counter').innerText = currentRoomIdx.toString().padStart(4, '0');
                }

                // Interactions Raycast
                raycaster.setFromCamera(mouse, camera);
                const interactables = [...doors, ...closets];
                const intersects = raycaster.intersectObjects(interactables);
                let hoveringSomething = false;

                if (intersects.length > 0 && intersects[0].distance < 8) {
                    const obj = intersects[0].object;
                    if ((obj.userData.isDoor && !obj.userData.isOpen) || (obj.userData.isCloset && !isHidden)) {
                        hoveringSomething = true;
                        document.getElementById('interact-prompt').innerText = obj.userData.isDoor ? 'Click to Open' : 'Click to Hide';
                        document.getElementById('interact-prompt').style.display = 'block';
                        document.getElementById('crosshair').style.transform = 'translate(-50%, -50%) scale(1.5)';
                        obj.userData.isHovered = true;
                    }
                } 

                if (!hoveringSomething) {
                    document.getElementById('interact-prompt').style.display = 'none';
                    document.getElementById('crosshair').style.transform = 'translate(-50%, -50%) scale(1)';
                    interactables.forEach(d => d.userData.isHovered = false);
                }
            }

            // Door Animations
            doors.forEach(door => {
                if (door.userData.isOpen && door.userData.pivot.rotation.y > -Math.PI / 1.8) {
                    door.userData.pivot.rotation.y -= 4 * delta;
                }
            });

            // Player Interpolation
            Object.values(otherPlayers).forEach(p => p.mesh.position.lerp(p.targetPos, 0.15));

            // Monster & Flicker Events
            if (flickerTimer > 0) {
                flickerTimer -= delta;
                scene.traverse(child => {
                    if (child.isPointLight && !child.userData.isMonsterLight) {
                        child.intensity = Math.random() > 0.3 ? (child.userData.baseIntensity || 0.5) : 0;
                    }
                });
                if (flickerTimer <= 0) {
                    scene.traverse(child => {
                        if (child.isPointLight && !child.userData.isMonsterLight) child.intensity = child.userData.baseIntensity || 0.5;
                    });
                }
            } else if (activeMonster) {
                activeMonster.z -= activeMonster.speed * delta;
                activeMonster.mesh.position.z = activeMonster.z;
                activeMonster.mesh.children[1].rotation.x += 10 * delta;
                activeMonster.mesh.children[1].rotation.y += 10 * delta;

                // Kill check
                if (Math.abs(camera.position.z - activeMonster.z) < 6 && !isHidden && !isDead) {
                    die();
                }

                if (activeMonster.z < activeMonster.targetZ) {
                    scene.remove(activeMonster.mesh);
                    activeMonster = null;
                }
            }

            renderer.render(scene, camera);
        }
    </script>
