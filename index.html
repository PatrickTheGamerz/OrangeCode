<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sans Multiversal Simulator</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        color: white;
        font-family: monospace;
    }

    #game {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(circle, #111, #000);
    }

    .sans {
        position: absolute;
        width: 60px;
        height: 60px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 20px cyan;
    }

    .bone {
        position: absolute;
        width: 20px;
        height: 80px;
        background: cyan;
        border-radius: 5px;
        box-shadow: 0 0 15px cyan;
    }

    .blaster {
        position: absolute;
        width: 120px;
        height: 60px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 20px purple;
    }

    #universeLabel {
        position: absolute;
        top: 10px;
        left: 10px;
        font-size: 22px;
    }
</style>
</head>
<body>

<div id="game">
    <div id="universeLabel">Universe: 1</div>
    <div id="sans" class="sans"></div>
</div>

<script>
const game = document.getElementById("game");
const sans = document.getElementById("sans");
const label = document.getElementById("universeLabel");

let x = 300, y = 300;
let speed = 6;
let universe = 1;

let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function moveSans() {
    if (keys["w"]) y -= speed;
    if (keys["s"]) y += speed;
    if (keys["a"]) x -= speed;
    if (keys["d"]) x += speed;

    sans.style.left = x + "px";
    sans.style.top = y + "px";
}

function summonBone() {
    const bone = document.createElement("div");
    bone.className = "bone";
    bone.style.left = (x + 20) + "px";
    bone.style.top = (y - 60) + "px";
    game.appendChild(bone);

    let by = y - 60;
    const interval = setInterval(() => {
        by -= 10;
        bone.style.top = by + "px";
        if (by < -100) {
            bone.remove();
            clearInterval(interval);
        }
    }, 30);
}

function summonBlaster() {
    const blaster = document.createElement("div");
    blaster.className = "blaster";
    blaster.style.left = (x + 80) + "px";
    blaster.style.top = (y - 20) + "px";
    game.appendChild(blaster);

    setTimeout(() => {
        blaster.style.boxShadow = "0 0 40px red";
    }, 300);

    setTimeout(() => blaster.remove(), 1000);
}

function teleport() {
    x = Math.random() * (window.innerWidth - 100);
    y = Math.random() * (window.innerHeight - 100);
}

function switchUniverse() {
    universe++;
    if (universe > 5) universe = 1;

    label.textContent = "Universe: " + universe;

    document.body.style.background =
        universe % 2 === 0
        ? "radial-gradient(circle, #003, #000)"
        : "radial-gradient(circle, #111, #000)";
}

document.addEventListener("keydown", e => {
    if (e.key === "j") summonBone();
    if (e.key === "k") summonBlaster();
    if (e.key === "l") teleport();
    if (e.key === "m") switchUniverse();
});

function gameLoop() {
    moveSans();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
