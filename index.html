<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sans vs Chara Corridor</title>
<style>
html,body{margin:0;padding:0;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;overflow:hidden}
#ui{position:fixed;top:10px;left:10px;z-index:10;font-size:14px;text-shadow:0 0 4px #000}
#ui span{margin-right:18px}
#gameCanvas{display:block;margin:0 auto;background:#000;border:2px solid #444}
#overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.9);color:#fff;font-size:22px;flex-direction:column;z-index:20}
button{padding:8px 18px;margin-top:12px;background:#444;border:none;color:#fff;cursor:pointer;font-size:14px}
button:hover{background:#666}
</style>
</head>
<body>
<div id="ui">
<span>Chara HP: <span id="hpText">100</span></span>
<span>Heals: <span id="healText">3</span></span>
<span>Sans HP: <span id="sansHpText">200</span></span>
<span>Sans Stamina: <span id="stamText">100</span></span>
<span>Phase: <span id="phaseText">1</span></span>
<span>Controls: A/D move, W jump, J slash, H heal</span>
</div>
<canvas id="gameCanvas" width="960" height="540"></canvas>
<div id="overlay">
<div id="overlayText">Last Corridor - Sans vs Chara</div>
<div style="font-size:14px;margin-top:6px">Survive Sans' attacks and defeat him. Move during blue bones to take damage.</div>
<button id="startBtn">Start</button>
</div>
<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
const hpText=document.getElementById("hpText");
const healText=document.getElementById("healText");
const sansHpText=document.getElementById("sansHpText");
const stamText=document.getElementById("stamText");
const phaseText=document.getElementById("phaseText");
const overlay=document.getElementById("overlay");
const overlayText=document.getElementById("overlayText");
const startBtn=document.getElementById("startBtn");
const keys={};
let lastTime=0;
let player,sans,boneRains,blasters,boneJumps,phase,phaseTimer,gameOver,started,shakeTime,shakeIntensity,gravityAttackTimer;
const GROUND_Y=400;
const PLAYER_SPEED=4.2;
const PLAYER_JUMP=-13;
const PLAYER_GRAVITY=0.7;
const MAX_PLAYER_HP=100;
const MAX_SANS_HP=220;
const MAX_STAMINA=100;
const STAMINA_REGEN=4;
const SLASH_COOLDOWN=550;
const HEAL_COOLDOWN=6000;
const HEAL_AMOUNT=35;
const MAX_HEALS=3;
const PHASE_DURATION=26000;
const BONE_RAIN_INTERVAL_BASE=1800;
const BLASTER_INTERVAL_BASE=5200;
const BONE_JUMP_INTERVAL_BASE=4200;
const GRAVITY_ATTACK_INTERVAL_BASE=9000;
const BLUE_BONE_TIME=1600;
const WHITE_BONE_RISE_TIME=600;
const SHAKE_DECAY=0.9;
let boneRainTimer,blasterTimer,boneJumpTimer,gravityTimer;
window.addEventListener("keydown",e=>{keys[e.key.toLowerCase()]=true;if([" ","arrowup","arrowdown","arrowleft","arrowright"].includes(e.key.toLowerCase()))e.preventDefault()});
window.addEventListener("keyup",e=>{keys[e.key.toLowerCase()]=false});
startBtn.onclick=()=>{startGame()};
function startGame(){
player={x:canvas.width*0.25,y:GROUND_Y-60,w:34,h:60,vx:0,vy:0,onGround:false,hp:MAX_PLAYER_HP,face:1,slashTimer:0,heals:MAX_HEALS,lastHeal:-1,gravityDir:1,gravityStateTime:0};
sans={x:canvas.width*0.7,y:GROUND_Y-70,w:40,h:70,hp:MAX_SANS_HP,stamina:MAX_STAMINA,lastDodge:0};
boneRains=[];
blasters=[];
boneJumps=[];
phase=1;
phaseTimer=0;
boneRainTimer=0;
blasterTimer=0;
boneJumpTimer=0;
gravityTimer=0;
gravityAttackTimer=0;
gameOver=false;
started=true;
shakeTime=0;
shakeIntensity=0;
overlay.style.display="none";
lastTime=performance.now();
requestAnimationFrame(loop);
}
function loop(timestamp){
if(!started)return;
const dt=timestamp-lastTime;
lastTime=timestamp;
update(dt);
draw();
if(!gameOver)requestAnimationFrame(loop);
}
function update(dt){
phaseTimer+=dt;
if(phaseTimer>PHASE_DURATION){
phaseTimer=0;
phase++;
if(phase>4)phase=4;
}
phaseText.textContent=phase;
hpText.textContent=Math.max(0,Math.floor(player.hp));
healText.textContent=player.heals;
sansHpText.textContent=Math.max(0,Math.floor(sans.hp));
stamText.textContent=Math.max(0,Math.floor(sans.stamina));
handlePlayer(dt);
handleSansAI(dt);
updateBoneRain(dt);
updateBlasters(dt);
updateBoneJumps(dt);
handleGravityAttack(dt);
checkCollisions();
if(player.hp<=0){
player.hp=0;
endGame(false);
}
if(sans.hp<=0){
sans.hp=0;
endGame(true);
}
if(shakeTime>0){
shakeTime-=dt;
shakeIntensity*=SHAKE_DECAY;
if(shakeTime<0)shakeTime=0;
}
}
function handlePlayer(dt){
player.vx=0;
if(keys["a"])player.vx=-PLAYER_SPEED;
if(keys["d"])player.vx=PLAYER_SPEED;
if(keys["w"]&&player.onGround){
player.vy=PLAYER_JUMP*player.gravityDir;
player.onGround=false;
}
player.vy+=PLAYER_GRAVITY*player.gravityDir;
player.x+=player.vx;
player.y+=player.vy;
if(player.gravityDir===1){
if(player.y+player.h>GROUND_Y){
player.y=GROUND_Y-player.h;
player.vy=0;
player.onGround=true;
}
if(player.y<120){
player.y=120;
player.vy=0;
}
}else{
if(player.y<120){
player.y=120;
player.vy=0;
player.onGround=true;
}
if(player.y+player.h>GROUND_Y){
player.y=GROUND_Y-player.h;
player.vy=0;
}
}
if(player.x<120)player.x=120;
if(player.x+player.w>canvas.width-120)player.x=canvas.width-120-player.w;
if(player.vx>0)player.face=1;
else if(player.vx<0)player.face=-1;
player.slashTimer-=dt;
if(player.slashTimer<0)player.slashTimer=0;
if(keys["j"])trySlash();
if(keys["h"])tryHeal();
if(player.gravityStateTime>0){
player.gravityStateTime-=dt;
if(player.gravityStateTime<=0){
player.gravityDir=1;
}
}
}
function trySlash(){
if(player.slashTimer>0)return;
player.slashTimer=SLASH_COOLDOWN;
const range=60;
const slashWidth=40;
const dir=player.face||1;
const sx=dir===1?player.x+player.w:sans.x-player.w;
const hitBox={x:player.x+(dir===1?player.w: -range),y:player.y+10,w:range,h:player.h-20};
if(rectOverlap(hitBox,sans)){
if(sans.stamina>0){
const now=performance.now();
if(now-sans.lastDodge>350){
sans.lastDodge=now;
sans.stamina-=22;
if(sans.stamina<0)sans.stamina=0;
const dodgeDir=Math.random()<0.5?-1:1;
sans.x+=dodgeDir*70;
if(sans.x<canvas.width*0.55)sans.x=canvas.width*0.55;
if(sans.x>canvas.width*0.9)sans.x=canvas.width*0.9;
shakeTime=200;
shakeIntensity=3;
}
}else{
sans.hp-=14+phase*2;
shakeTime=260;
shakeIntensity=4;
}
}
}
function tryHeal(){
const now=performance.now();
if(player.heals<=0)return;
if(player.hp>MAX_PLAYER_HP*0.45)return;
if(player.lastHeal>0&&now-player.lastHeal<HEAL_COOLDOWN)return;
player.lastHeal=now;
player.heals--;
player.hp+=HEAL_AMOUNT;
if(player.hp>MAX_PLAYER_HP)player.hp=MAX_PLAYER_HP;
shakeTime=200;
shakeIntensity=3;
}
function handleSansAI(dt){
if(sans.stamina<MAX_STAMINA){
sans.stamina+=STAMINA_REGEN*dt/1000;
if(sans.stamina>MAX_STAMINA)sans.stamina=MAX_STAMINA;
}
boneRainTimer+=dt;
blasterTimer+=dt;
boneJumpTimer+=dt;
gravityTimer+=dt;
const boneRainInterval=Math.max(BONE_RAIN_INTERVAL_BASE-160*phase,900);
const blasterInterval=Math.max(BLASTER_INTERVAL_BASE-260*phase,2600);
const boneJumpInterval=Math.max(BONE_JUMP_INTERVAL_BASE-200*phase,1800);
const gravityInterval=Math.max(GRAVITY_ATTACK_INTERVAL_BASE-400*phase,4200);
if(boneRainTimer>boneRainInterval){
boneRainTimer=0;
spawnBoneRain();
}
if(blasterTimer>blasterInterval){
blasterTimer=0;
spawnBlasters();
}
if(boneJumpTimer>boneJumpInterval){
boneJumpTimer=0;
spawnBoneJump();
}
if(gravityTimer>gravityInterval){
gravityTimer=0;
triggerGravityAttack();
}
}
function spawnBoneRain(){
const count=6+phase*2;
for(let i=0;i<count;i++){
const delay=i*90;
const x=140+Math.random()*(canvas.width-280);
boneRains.push({x:x,y:-40,w:18,h:40,vy:3+Math.random()*1.5+phase*0.4,delay:delay,life:6000});
}
}
function updateBoneRain(dt){
for(let i=boneRains.length-1;i>=0;i--){
const b=boneRains[i];
if(b.delay>0){
b.delay-=dt;
continue;
}
b.y+=b.vy;
b.life-=dt;
if(b.life<=0||b.y>canvas.height+80)boneRains.splice(i,1);
}
}
function spawnBlasters(){
const px=player.x+player.w/2;
const py=player.y+player.h/2;
const sx=sans.x+sans.w/2;
const sy=sans.y+sans.h/2;
const baseAngle=Math.atan2(py-sy,px-sx);
const spread=0.35;
const angles=[baseAngle-spread,baseAngle,baseAngle+spread];
for(let i=0;i<3;i++){
const a=angles[i];
const dist=120;
const bx=sx+Math.cos(a)*dist;
const by=sy+Math.sin(a)*dist;
blasters.push({x:bx,y:by,angle:a,time:0,warning:true});
}
shakeTime=350;
shakeIntensity=5;
}
function updateBlasters(dt){
for(let i=blasters.length-1;i>=0;i--){
const b=blasters[i];
b.time+=dt;
if(b.warning&&b.time>450){
b.warning=false;
b.time=0;
}
if(!b.warning&&b.time>650){
blasters.splice(i,1);
}
}
}
function spawnBoneJump(){
const lanes=2+phase;
for(let i=0;i<lanes;i++){
const x=160+Math.random()*(canvas.width-320);
boneJumps.push({x:x,y:GROUND_Y-10,w:20,h:10,phase:"white",time:0});
}
}
function updateBoneJumps(dt){
for(let i=boneJumps.length-1;i>=0;i--){
const b=boneJumps[i];
b.time+=dt;
if(b.phase==="white"){
b.h=10+40*(b.time/WHITE_BONE_RISE_TIME);
b.y=GROUND_Y-b.h;
if(b.time>WHITE_BONE_RISE_TIME){
b.phase="blue";
b.time=0;
b.h=180;
b.y=GROUND_Y-b.h;
}
}else if(b.phase==="blue"){
if(b.time>BLUE_BONE_TIME){
boneJumps.splice(i,1);
}
}
}
}
function triggerGravityAttack(){
player.gravityDir=-1;
player.gravityStateTime=2200+phase*200;
shakeTime=260;
shakeIntensity=4;
}
function handleGravityAttack(dt){
if(player.gravityStateTime>0){
}
}
function rectOverlap(a,b){
return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
}
function checkCollisions(){
for(let i=boneRains.length-1;i>=0;i--){
const b=boneRains[i];
const hitBox={x:b.x,y:b.y,w:b.w,h:b.h};
if(rectOverlap(hitBox,player)){
player.hp-=6+phase*2;
boneRains.splice(i,1);
shakeTime=220;
shakeIntensity=4;
}
}
for(let i=blasters.length-1;i>=0;i--){
const b=blasters[i];
if(b.warning)continue;
const beamLen=260;
const bw=26;
const bx=b.x-Math.cos(b.angle)*20;
const by=b.y-Math.sin(b.angle)*20;
const ex=bx+Math.cos(b.angle)*beamLen;
const ey=by+Math.sin(b.angle)*beamLen;
const steps=16;
for(let s=0;s<steps;s++){
const t=s/steps;
const cx=bx+(ex-bx)*t;
const cy=by+(ey-by)*t;
const beamBox={x:cx-bw/2,y:cy-bw/2,w:bw,h:bw};
if(rectOverlap(beamBox,player)){
player.hp-=14+phase*3;
shakeTime=260;
shakeIntensity=5;
break;
}
}
}
for(let i=boneJumps.length-1;i>=0;i--){
const b=boneJumps[i];
const hitBox={x:b.x,y:b.y,w:b.w,h:b.h};
if(rectOverlap(hitBox,player)){
if(b.phase==="white"){
player.hp-=8+phase*2;
shakeTime=220;
shakeIntensity=4;
}else if(b.phase==="blue"){
const moving=Math.abs(player.vx)+Math.abs(player.vy)>0.4;
if(moving){
player.hp-=10+phase*3;
shakeTime=260;
shakeIntensity=5;
}
}
}
}
}
function endGame(win){
gameOver=true;
started=false;
overlay.style.display="flex";
overlayText.textContent=win?"You defeated Sans.":"You died. You felt your sins crawling.";
startBtn.textContent="Play again";
}
function draw(){
let offsetX=0,offsetY=0;
if(shakeTime>0){
offsetX=(Math.random()*2-1)*shakeIntensity;
offsetY=(Math.random()*2-1)*shakeIntensity;
}
ctx.save();
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.translate(offsetX,offsetY);
drawCorridor();
drawBoneRain();
drawBoneJumps();
drawBlasters();
drawSans();
drawPlayer();
drawBars();
ctx.restore();
}
function drawCorridor(){
ctx.fillStyle="#000";
ctx.fillRect(0,0,canvas.width,canvas.height);
const grad=ctx.createLinearGradient(0,0,0,GROUND_Y);
grad.addColorStop(0,"#111");
grad.addColorStop(0.5,"#151515");
grad.addColorStop(1,"#202020");
ctx.fillStyle=grad;
ctx.fillRect(0,0,canvas.width,GROUND_Y);
ctx.fillStyle="#2a1a0a";
ctx.fillRect(0,GROUND_Y,canvas.width,canvas.height-GROUND_Y);
ctx.fillStyle="#d9c9a3";
ctx.fillRect(canvas.width/2-70,80,140,260);
ctx.fillStyle="#f7f0d0";
ctx.fillRect(canvas.width/2-40,100,80,220);
ctx.fillStyle="rgba(255,255,220,0.18)";
ctx.beginPath();
ctx.moveTo(canvas.width/2-120,80);
ctx.lineTo(canvas.width/2+120,80);
ctx.lineTo(canvas.width/2+260,GROUND_Y);
ctx.lineTo(canvas.width/2-260,GROUND_Y);
ctx.closePath();
ctx.fill();
ctx.fillStyle="#3b2b1a";
for(let i=0;i<4;i++){
const x=160+i*160;
ctx.fillRect(x,120,40,GROUND_Y-120);
}
ctx.strokeStyle="#444";
ctx.lineWidth=3;
ctx.strokeRect(120,100,canvas.width-240,GROUND_Y-120);
ctx.fillStyle="#111";
ctx.fillRect(120,100,canvas.width-240,GROUND_Y-120);
}
function drawPlayer(){
ctx.save();
ctx.translate(player.x+player.w/2,player.y+player.h/2);
ctx.scale(1,player.gravityDir);
ctx.translate(-player.w/2,-player.h/2);
ctx.fillStyle="#3b0000";
ctx.fillRect(4,0,26,30);
ctx.fillStyle="#5c0000";
ctx.fillRect(2,28,30,18);
ctx.fillStyle="#2b2b2b";
ctx.fillRect(4,44,10,16);
ctx.fillRect(20,44,10,16);
ctx.fillStyle="#f0e0d0";
ctx.fillRect(6,4,22,18);
ctx.fillStyle="#000";
ctx.fillRect(10,10,4,3);
ctx.fillRect(20,10,4,3);
ctx.fillRect(14,16,6,2);
ctx.fillStyle="#0f0";
if(player.slashTimer>SLASH_COOLDOWN-160){
const dir=player.face||1;
ctx.fillRect(dir===1?26:-18,10,18,6);
}
ctx.restore();
}
function drawSans(){
ctx.save();
ctx.translate(sans.x+sans.w/2,sans.y+sans.h/2);
ctx.fillStyle="#fff";
ctx.beginPath();
ctx.arc(0,-20,16,0,Math.PI*2);
ctx.fill();
ctx.fillStyle="#000";
ctx.fillRect(-8,-24,4,3);
ctx.fillRect(4,-24,4,3);
ctx.fillRect(-4,-16,8,2);
ctx.fillStyle="#4aa";
ctx.fillRect(-14,-2,28,26);
ctx.fillStyle="#fff";
ctx.fillRect(-12,0,10,18);
ctx.fillRect(2,0,10,18);
ctx.fillStyle="#333";
ctx.fillRect(-10,18,8,18);
ctx.fillRect(2,18,8,18);
ctx.restore();
}
function drawBoneRain(){
ctx.fillStyle="#fff";
for(const b of boneRains){
ctx.fillRect(b.x,b.y,b.w,b.h);
ctx.fillStyle="#ccc";
ctx.fillRect(b.x,b.y,b.w,4);
ctx.fillRect(b.x,b.y+b.h-4,b.w,4);
ctx.fillStyle="#fff";
}
}
function drawBoneJumps(){
for(const b of boneJumps){
if(b.phase==="white"){
ctx.fillStyle="#fff";
}else{
ctx.fillStyle="#55f";
}
ctx.fillRect(b.x,b.y,b.w,b.h);
}
}
function drawBlasters(){
for(const bl of blasters){
ctx.save();
ctx.translate(bl.x,bl.y);
ctx.rotate(bl.angle);
ctx.fillStyle="#fff";
ctx.fillRect(-26,-18,52,36);
ctx.fillStyle="#000";
ctx.fillRect(-18,-10,8,6);
ctx.fillRect(10,-10,8,6);
ctx.fillRect(-6,0,12,4);
if(bl.warning){
ctx.globalAlpha=0.4+0.3*Math.sin(bl.time*0.02);
ctx.fillStyle="#0ff";
ctx.fillRect(20,-6,80,12);
}else{
ctx.globalAlpha=0.85;
ctx.fillStyle="#0ff";
ctx.fillRect(20,-8,220,16);
}
ctx.restore();
ctx.globalAlpha=1;
}
}
function drawBars(){
const pRatio=Math.max(0,player.hp)/MAX_PLAYER_HP;
const sRatio=Math.max(0,sans.hp)/MAX_SANS_HP;
const stRatio=Math.max(0,sans.stamina)/MAX_STAMINA;
ctx.fillStyle="#400";
ctx.fillRect(140,40,260,10);
ctx.fillStyle="#f00";
ctx.fillRect(140,40,260*pRatio,10);
ctx.fillStyle="#044";
ctx.fillRect(canvas.width-400,40,260,10);
ctx.fillStyle="#0ff";
ctx.fillRect(canvas.width-400,40,260*sRatio,10);
ctx.fillStyle="#220";
ctx.fillRect(canvas.width-400,60,260,8);
ctx.fillStyle="#ff0";
ctx.fillRect(canvas.width-400,60,260*stRatio,8);
ctx.fillStyle="#fff";
ctx.font="12px Arial";
ctx.fillText("CHARA",140,34);
ctx.fillText("SANS",canvas.width-400,34);
ctx.fillText("STAMINA",canvas.width-400,56);
}
</script>
</body>
</html>
